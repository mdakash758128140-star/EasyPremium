<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Premium - গ্রুপ ভয়েস কল</title>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #0f172a, #1e1b4b); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 48px; max-width: 950px; width: 100%; padding: 25px; border: 1px solid rgba(255,255,255,0.2); }
        h2 { text-align: center; color: #f0f0ff; margin-bottom: 15px; }
        button { width: 100%; padding: 12px 15px; border-radius: 60px; border: none; font-size: 1rem; margin-top: 8px; cursor: pointer; transition: 0.2s; font-weight: bold; }
        button:hover { opacity: 0.9; transform: scale(1.02); }
        .btn-google { background: #4285f4; color: white; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .card { background: rgba(0,0,0,0.3); border-radius: 32px; padding: 18px; margin-bottom: 20px; }
        .status { background: rgba(0,0,0,0.6); border-radius: 60px; padding: 10px; text-align: center; color: #e2e8f0; margin: 10px 0; font-size: 0.9rem; }
        .participants-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 25px; margin-top: 20px; }
        .participant-circle { text-align: center; width: 100px; cursor: pointer; }
        .circle { width: 80px; height: 80px; border-radius: 50%; background: #2d2b55; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; border: 3px solid #4f46e5; transition: all 0.1s; }
        .circle.speaking { animation: pulseRotate 0.5s infinite alternate; border-color: #facc15; }
        @keyframes pulseRotate { 0% { transform: scale(1) rotate(0deg); } 100% { transform: scale(1.08) rotate(5deg); } }
        .participant-name { color: white; background: rgba(0,0,0,0.6); border-radius: 40px; padding: 4px; font-size: 0.8rem; word-break: break-word; }
        .connection-badge { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 5px; }
        .badge-connected { background: #10b981; box-shadow: 0 0 5px #10b981; }
        .badge-disconnected { background: #ef4444; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="container" id="app">
    <!-- Login Section -->
    <div id="authSection">
        <h2>🔐 গ্রুপ ভয়েস কল - গুগল লগইন</h2>
        <div class="card">
            <button id="googleLoginBtn" class="btn-google">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" height="20" alt="Google"> 
                গুগল অ্যাকাউন্ট দিয়ে লগইন করুন
            </button>
        </div>
        <div id="authStatus" class="status"></div>
    </div>

    <!-- Voice Call Section - only participant grid -->
    <div id="voiceSection" class="hidden">
        <div class="card">
            <div id="participantGrid" class="participants-grid"><div style="color:gray;">লোড হচ্ছে...</div></div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBt9t6mcjUtXxX2igAJdseuIIc8pP_QPEw",
        authDomain: "easy-premium.firebaseapp.com",
        databaseURL: "https://easy-premium-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "easy-premium",
        storageBucket: "easy-premium.firebasestorage.app",
        messagingSenderId: "155891252265",
        appId: "1:155891252265:web:77ab41de24231e8e5ef038"
    };
    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();
    const provider = new firebase.auth.GoogleAuthProvider();

    // DOM elements
    const authSection = document.getElementById('authSection');
    const voiceSection = document.getElementById('voiceSection');
    const authStatus = document.getElementById('authStatus');
    const googleLoginBtn = document.getElementById('googleLoginBtn');
    const participantGrid = document.getElementById('participantGrid');

    // Voice call state
    const ROOM_ID = "easy-premium-group";
    let currentUserId = null;
    let localStream = null;
    let peerConnections = new Map();     // userId -> RTCPeerConnection
    let remoteAudios = new Map();        // userId -> HTMLAudioElement
    let roomUsersRef = null;
    let audioContext = null;
    let localAnalyser = null;
    let animationFrame = null;
    let iceServers = [];
    let isInCall = false;

    // Helper logging
    function addLog(msg, isErr = false) {
        const time = new Date().toLocaleTimeString();
        if (isErr) console.error(`[${time}] ${msg}`);
        else console.log(`[${time}] ${msg}`);
    }

    // Load TURN/STUN servers (prefer STUN first, fallback to TURN)
    async function loadIceServers() {
        try {
            addLog("Loading TURN credentials...");
            const response = await fetch("https://easy-premium.metered.live/api/v1/turn/credentials?apiKey=546ad2772f911ebe6c4b6e0ae95f76ac36d3");
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            iceServers = Array.isArray(data) ? data : (data.iceServers || data);
            if (!iceServers || iceServers.length === 0) throw new Error("No TURN servers");
            addLog(`✅ TURN loaded (${iceServers.length} servers)`);
        } catch (e) {
            addLog(`⚠️ TURN failed: ${e.message} → using STUN only`, true);
            iceServers = [
                { urls: "stun:stun.l.google.com:19302" },
                { urls: "stun:stun1.l.google.com:19302" }
            ];
        }
    }

    function sanitizeUserId(id) {
        return id.replace(/[.#$\[\]\/]/g, '_').substring(0, 30);
    }

    // Force play all remote audio (triggered by clicking any circle)
    window.forcePlayAllAudios = function() {
        remoteAudios.forEach((audio, userId) => {
            if (audio && audio.paused) {
                audio.play().catch(e => addLog(`⚠️ Cannot play audio for ${userId}: ${e.message}`, true));
            }
        });
    };

    // Update participant grid UI
    function updateParticipantsList(usersList) {
        if (!usersList || usersList.length === 0) {
            participantGrid.innerHTML = '<div style="color:gray; text-align:center;">কেউ নেই</div>';
            return;
        }
        let html = '';
        for (let uid of usersList) {
            const isMe = (uid === currentUserId);
            const isConnected = peerConnections.has(uid);
            const badgeClass = isConnected ? 'badge-connected' : 'badge-disconnected';
            html += `
                <div class="participant-circle" onclick="window.forcePlayAllAudios()">
                    <div class="circle" id="circle-${uid}"><span style="font-size:28px;">${isMe ? '🎤' : '👤'}</span></div>
                    <div class="participant-name">
                        <span class="connection-badge ${badgeClass}"></span>
                        ${uid.substring(0, 12)}${isMe ? ' (আপনি)' : ''}
                    </div>
                </div>
            `;
        }
        participantGrid.innerHTML = html;
    }

    // Animate speaking circle based on local microphone volume
    function setupLocalVolumeDetection(stream) {
        if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioContext.createMediaStreamSource(stream);
        const analyser = audioContext.createAnalyser();
        analyser.fftSize = 256;
        const dataArray = new Uint8Array(analyser.frequencyBinCount);
        source.connect(analyser);
        localAnalyser = analyser;
        audioContext.resume().catch(e => addLog(`AudioContext resume error: ${e.message}`, true));
        
        function detectSpeaking() {
            if (!localAnalyser || !currentUserId) return;
            localAnalyser.getByteFrequencyData(dataArray);
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
            let avg = sum / dataArray.length;
            let isSpeaking = avg > 20;
            const circle = document.getElementById(`circle-${currentUserId}`);
            if (circle) {
                if (isSpeaking) circle.classList.add('speaking');
                else circle.classList.remove('speaking');
            }
            animationFrame = requestAnimationFrame(detectSpeaking);
        }
        detectSpeaking();
    }

    // Create RTCPeerConnection for a remote user
    async function createPeerConnection(targetUserId) {
        if (peerConnections.has(targetUserId)) return peerConnections.get(targetUserId);
        addLog(`Creating connection to ${targetUserId}`);
        const pc = new RTCPeerConnection({ iceServers: iceServers });
        
        // Add local tracks
        if (localStream) {
            localStream.getTracks().forEach(track => {
                pc.addTrack(track, localStream);
                addLog(`➕ Added ${track.kind} track to ${targetUserId}`);
            });
        }
        
        // ICE candidate handling
        pc.onicecandidate = (event) => {
            if (event.candidate) {
                db.ref(`voice_rooms/${ROOM_ID}/candidates/${targetUserId}`).push({
                    from: currentUserId,
                    candidate: event.candidate
                }).catch(e => addLog(`ICE candidate save error: ${e.message}`, true));
            }
        };
        
        // Remote track received
        pc.ontrack = (event) => {
            addLog(`📡 Received audio track from ${targetUserId}`);
            let audio = remoteAudios.get(targetUserId);
            if (!audio) {
                audio = new Audio();
                audio.autoplay = false;
                audio.style.display = 'none';
                document.body.appendChild(audio);
                remoteAudios.set(targetUserId, audio);
            }
            audio.srcObject = event.streams[0];
            // Attempt to play immediately (may be blocked by browser policy)
            audio.play().catch(e => addLog(`⚠️ Autoplay blocked for ${targetUserId}. Click on any avatar to play.`, true));
        };
        
        pc.onconnectionstatechange = () => {
            addLog(`Connection state with ${targetUserId}: ${pc.connectionState}`);
            if (pc.connectionState === 'connected') {
                updateParticipantsList(Array.from(peerConnections.keys()).concat([currentUserId]));
            } else if (pc.connectionState === 'failed') {
                addLog(`Connection failed with ${targetUserId}, will retry later`, true);
                peerConnections.delete(targetUserId);
                // Retry after 3 seconds
                setTimeout(() => {
                    if (isInCall && currentUserId) callUser(targetUserId);
                }, 3000);
            }
        };
        
        peerConnections.set(targetUserId, pc);
        return pc;
    }
    
    // Initiate call to a remote user
    async function callUser(targetUserId) {
        if (targetUserId === currentUserId) return;
        if (peerConnections.has(targetUserId)) return;
        addLog(`📞 Calling ${targetUserId}`);
        try {
            const pc = await createPeerConnection(targetUserId);
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            await db.ref(`voice_rooms/${ROOM_ID}/offers/${targetUserId}`).push({
                from: currentUserId,
                offer: { type: offer.type, sdp: offer.sdp }
            });
        } catch (err) {
            addLog(`Failed to call ${targetUserId}: ${err.message}`, true);
        }
    }
    
    // Setup signaling listeners (offers, answers, ICE candidates)
    function setupSignaling() {
        // Offers
        const offerRef = db.ref(`voice_rooms/${ROOM_ID}/offers/${currentUserId}`);
        offerRef.on('child_added', async (snapshot) => {
            const data = snapshot.val();
            if (!data || data.from === currentUserId) return;
            addLog(`📨 Received offer from ${data.from}`);
            try {
                let pc = peerConnections.get(data.from);
                if (!pc) pc = await createPeerConnection(data.from);
                if (pc.signalingState === 'stable') {
                    await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    await db.ref(`voice_rooms/${ROOM_ID}/answers/${data.from}`).push({
                        from: currentUserId,
                        answer: { type: answer.type, sdp: answer.sdp }
                    });
                }
                await snapshot.ref.remove();
            } catch (err) {
                addLog(`Error handling offer from ${data.from}: ${err.message}`, true);
            }
        });
        
        // Answers
        const answerRef = db.ref(`voice_rooms/${ROOM_ID}/answers/${currentUserId}`);
        answerRef.on('child_added', async (snapshot) => {
            const data = snapshot.val();
            if (!data || data.from === currentUserId) return;
            const pc = peerConnections.get(data.from);
            if (pc && pc.signalingState === 'have-local-offer') {
                try {
                    await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
                    await snapshot.ref.remove();
                } catch (err) {
                    addLog(`Error setting answer from ${data.from}: ${err.message}`, true);
                }
            }
        });
        
        // ICE candidates
        const candidateRef = db.ref(`voice_rooms/${ROOM_ID}/candidates/${currentUserId}`);
        candidateRef.on('child_added', async (snapshot) => {
            const data = snapshot.val();
            if (!data || data.from === currentUserId) return;
            const pc = peerConnections.get(data.from);
            if (pc && data.candidate) {
                try {
                    await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
                    await snapshot.ref.remove();
                } catch (err) {
                    addLog(`Error adding ICE candidate from ${data.from}: ${err.message}`, true);
                }
            }
        });
    }
    
    // Join the voice room
    async function joinCall() {
        if (!currentUserId) return;
        if (isInCall) {
            await leaveCall(false);
        }
        isInCall = true;
        addLog("Requesting microphone access...");
        if (!iceServers.length) await loadIceServers();
        
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            addLog("✅ Microphone access granted");
            setupLocalVolumeDetection(localStream);
            
            // Register user in Firebase
            await db.ref(`voice_rooms/${ROOM_ID}/users/${currentUserId}`).set({
                joined: Date.now(),
                name: currentUserId
            });
            
            setupSignaling();
            
            // Fetch existing users and call them
            const usersSnapshot = await db.ref(`voice_rooms/${ROOM_ID}/users`).once('value');
            const users = usersSnapshot.val() || {};
            const existingUsers = Object.keys(users).filter(uid => uid !== currentUserId);
            for (let uid of existingUsers) {
                setTimeout(() => callUser(uid), 500);
            }
            
            // Listen for new users joining
            const usersRef = db.ref(`voice_rooms/${ROOM_ID}/users`);
            usersRef.on('child_added', (snap) => {
                const uid = snap.key;
                if (uid !== currentUserId && !peerConnections.has(uid)) {
                    addLog(`🆕 New user joined: ${uid}`);
                    callUser(uid);
                }
                const allUsers = Array.from(peerConnections.keys()).concat([currentUserId]);
                updateParticipantsList(allUsers);
            });
            
            usersRef.on('child_removed', (snap) => {
                const uid = snap.key;
                addLog(`🚪 User left: ${uid}`);
                if (peerConnections.has(uid)) {
                    peerConnections.get(uid).close();
                    peerConnections.delete(uid);
                }
                if (remoteAudios.has(uid)) {
                    remoteAudios.get(uid).remove();
                    remoteAudios.delete(uid);
                }
                const allUsers = Array.from(peerConnections.keys()).concat([currentUserId]);
                updateParticipantsList(allUsers);
            });
            
            roomUsersRef = usersRef;
            updateParticipantsList(existingUsers.concat([currentUserId]));
            addLog("✅ Successfully joined voice room");
        } catch (err) {
            addLog(`❌ Failed to join: ${err.message}`, true);
            isInCall = false;
        }
    }
    
    async function leaveCall(removeFromFirebase = true) {
        if (!currentUserId) return;
        addLog("Leaving call...");
        if (animationFrame) cancelAnimationFrame(animationFrame);
        for (let [uid, pc] of peerConnections) {
            pc.close();
        }
        peerConnections.clear();
        remoteAudios.forEach(audio => audio.remove());
        remoteAudios.clear();
        if (localStream) {
            localStream.getTracks().forEach(t => t.stop());
            localStream = null;
        }
        if (roomUsersRef && removeFromFirebase) {
            await db.ref(`voice_rooms/${ROOM_ID}/users/${currentUserId}`).remove();
            roomUsersRef.off();
        }
        isInCall = false;
        participantGrid.innerHTML = '<div style="color:gray;">কল ছেড়েছেন</div>';
    }
    
    // Google login
    googleLoginBtn.onclick = async () => {
        googleLoginBtn.disabled = true;
        googleLoginBtn.innerText = "লগইন হচ্ছে...";
        try {
            const result = await auth.signInWithPopup(provider);
            const user = result.user;
            addLog(`✅ Logged in as ${user.displayName}`);
            authStatus.innerHTML = `✅ স্বাগতম, ${user.displayName}!`;
            authStatus.style.background = "#c6f6d5";
        } catch (err) {
            addLog(`❌ Login failed: ${err.message}`, true);
            authStatus.innerHTML = `❌ লগইন ব্যর্থ: ${err.message}`;
            authStatus.style.background = "#fed7d7";
            googleLoginBtn.disabled = false;
            googleLoginBtn.innerText = "গুগল অ্যাকাউন্ট দিয়ে লগইন করুন";
        }
    };
    
    // Auth state observer
    auth.onAuthStateChanged(async (user) => {
        if (user) {
            authSection.classList.add('hidden');
            voiceSection.classList.remove('hidden');
            const rawName = user.displayName || user.email.split('@')[0];
            currentUserId = sanitizeUserId(rawName + "_" + user.uid.substring(0, 6));
            if (!isInCall) {
                await joinCall();
            }
        } else {
            authSection.classList.remove('hidden');
            voiceSection.classList.add('hidden');
            if (isInCall) await leaveCall(false);
            currentUserId = null;
            googleLoginBtn.disabled = false;
            googleLoginBtn.innerText = "গুগল অ্যাকাউন্ট দিয়ে লগইন করুন";
            authStatus.innerHTML = '';
        }
    });
    
    // Preload ICE servers
    loadIceServers();
</script>
</body>
</html>
