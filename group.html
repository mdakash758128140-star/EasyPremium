<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Easy Premium - গ্রুপ ভয়েস কল (সম্পূর্ণ এরর হ্যান্ডলিং সহ)</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
            max-width: 950px;
            width: 100%;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        h2 {
            text-align: center;
            color: #f0f0ff;
            margin-bottom: 15px;
        }
        .input-group {
            margin-bottom: 16px;
        }
        input, button {
            width: 100%;
            padding: 12px 15px;
            border-radius: 60px;
            border: none;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }
        input {
            background: rgba(255,255,255,0.9);
            border: 1px solid #ccc;
        }
        input:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 2px rgba(139,92,246,0.3);
        }
        button {
            background: #8b5cf6;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
        }
        button:hover {
            background: #7c3aed;
            transform: scale(0.98);
        }
        .btn-secondary {
            background: #10b981;
        }
        .btn-secondary:hover {
            background: #059669;
        }
        .btn-danger {
            background: #ef4444;
        }
        .btn-danger:hover {
            background: #dc2626;
        }
        .card {
            background: rgba(0,0,0,0.3);
            border-radius: 32px;
            padding: 18px;
            margin-bottom: 20px;
            backdrop-filter: blur(5px);
        }
        .status {
            background: rgba(0,0,0,0.6);
            border-radius: 60px;
            padding: 10px 15px;
            text-align: center;
            font-size: 0.85rem;
            margin: 15px 0;
            color: #e2e8f0;
            word-break: break-word;
        }
        .error-notification {
            background: rgba(220,38,38,0.8);
            border-left: 4px solid #facc15;
            animation: fadeIn 0.3s ease;
        }
        .success-notification {
            background: rgba(34,197,94,0.8);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .participants-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            margin-top: 20px;
            min-height: 200px;
        }
        .participant-circle {
            text-align: center;
            width: 100px;
        }
        .circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(145deg, #2d2b55, #1e1b4b);
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #4f46e5;
            transition: 0.1s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
        .circle.speaking {
            animation: pulseRotate 0.5s infinite alternate;
            border-color: #facc15;
            box-shadow: 0 0 15px #facc15;
        }
        @keyframes pulseRotate {
            0% { transform: scale(1) rotate(0deg); }
            100% { transform: scale(1.08) rotate(5deg); }
        }
        .participant-name {
            color: white;
            background: rgba(0,0,0,0.6);
            border-radius: 40px;
            padding: 4px 8px;
            font-size: 0.8rem;
            word-break: break-word;
        }
        .flex-btns {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }
        .hidden {
            display: none;
        }
        .mic-btn {
            background: #f59e0b;
            width: auto;
            padding: 5px 15px;
            margin-top: 0;
        }
        .footer {
            font-size: 0.7rem;
            text-align: center;
            color: #aaa;
            margin-top: 25px;
        }
        .debug-log {
            font-family: monospace;
            font-size: 0.7rem;
            background: rgba(0,0,0,0.5);
            border-radius: 16px;
            padding: 8px;
            margin-top: 15px;
            max-height: 100px;
            overflow-y: auto;
            color: #ccc;
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <!-- লগইন সেকশন -->
    <div id="authSection">
        <h2>🔐 লগইন / রেজিস্টার</h2>
        <div class="card">
            <div class="input-group">
                <input type="email" id="loginEmail" placeholder="ইমেইল">
            </div>
            <div class="input-group">
                <input type="password" id="loginPassword" placeholder="পাসওয়ার্ড">
            </div>
            <button id="loginBtn">লগইন</button>
            <button id="signupBtn" class="btn-secondary">নতুন অ্যাকাউন্ট তৈরি করুন</button>
        </div>
        <div id="authStatus" class="status"></div>
    </div>

    <!-- ভয়েস কল সেকশন -->
    <div id="voiceSection" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>🎙️ গ্রুপ ভয়েস কল</h2>
            <button id="logoutBtn" class="btn-danger" style="width: auto; padding: 8px 16px;">লগআউট</button>
        </div>
        <div class="card">
            <div class="input-group">
                <input type="text" id="roomId" placeholder="রুম আইডি" value="easy-premium-group">
            </div>
            <div class="input-group">
                <input type="text" id="userId" placeholder="আপনার নাম (ইউনিক)">
            </div>
            <div class="flex-btns">
                <button id="joinBtn">🔊 জয়েন করুন</button>
                <button id="leaveBtn" class="btn-danger" disabled>🚪 কল ছাড়ুন</button>
            </div>
        </div>
        <div id="statusArea" class="status">⚡ সংযোগ শুরু হয়নি</div>
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <strong style="color:white;">👥 রুমের সদস্য (<span id="participantCount">0</span>)</strong>
                <button id="micToggle" class="mic-btn" disabled>🎤 মাইক চালু</button>
            </div>
            <div id="participantGrid" class="participants-grid">
                <div style="color:gray; text-align:center; width:100%;">কেউ নেই</div>
            </div>
        </div>
        <div class="footer">
            🎧 কথা বললে আপনার বৃত্ত ঘুরবে। কনসোল (F12) বিস্তারিত লগ দেখুন।
        </div>
        <div id="debugLog" class="debug-log"></div>
    </div>
</div>

<script>
    // ------------------- Firebase কনফিগারেশন -------------------
    const firebaseConfig = {
        apiKey: "AIzaSyBt9t6mcjUtXxX2igAJdseuIIc8pP_QPEw",
        authDomain: "easy-premium.firebaseapp.com",
        databaseURL: "https://easy-premium-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "easy-premium",
        storageBucket: "easy-premium.firebasestorage.app",
        messagingSenderId: "155891252265",
        appId: "1:155891252265:web:77ab41de24231e8e5ef038"
    };
    const app = firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();

    // ------------------- DOM এলিমেন্টস -------------------
    const authSection = document.getElementById('authSection');
    const voiceSection = document.getElementById('voiceSection');
    const authStatus = document.getElementById('authStatus');
    const loginEmail = document.getElementById('loginEmail');
    const loginPassword = document.getElementById('loginPassword');
    const loginBtn = document.getElementById('loginBtn');
    const signupBtn = document.getElementById('signupBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const roomInput = document.getElementById('roomId');
    const userIdInput = document.getElementById('userId');
    const joinBtn = document.getElementById('joinBtn');
    const leaveBtn = document.getElementById('leaveBtn');
    const statusDiv = document.getElementById('statusArea');
    const participantGrid = document.getElementById('participantGrid');
    const participantCountSpan = document.getElementById('participantCount');
    const micToggleBtn = document.getElementById('micToggle');
    const debugLogDiv = document.getElementById('debugLog');

    // ------------------- হেল্পার: লগ ও এরর দেখানো -------------------
    function addDebugLog(msg, isError = false) {
        const logEntry = document.createElement('div');
        logEntry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        logEntry.style.color = isError ? '#f87171' : '#86efac';
        logEntry.style.fontSize = '0.7rem';
        logEntry.style.marginBottom = '4px';
        debugLogDiv.appendChild(logEntry);
        debugLogDiv.scrollTop = debugLogDiv.scrollHeight;
        // 30 লগের বেশি হলে পুরনো মুছে ফেলি
        while (debugLogDiv.children.length > 30) debugLogDiv.removeChild(debugLogDiv.firstChild);
    }

    function showStatusMessage(msg, isError = false) {
        statusDiv.innerHTML = isError ? `❌ ${msg}` : `✅ ${msg}`;
        statusDiv.className = `status ${isError ? 'error-notification' : 'success-notification'}`;
        addDebugLog(msg, isError);
        setTimeout(() => {
            if (statusDiv.innerHTML === `❌ ${msg}` || statusDiv.innerHTML === `✅ ${msg}`) {
                if (!isError && currentRoomId) statusDiv.innerHTML = `🎤 রুম: ${currentRoomId}`;
                else if (!isError) statusDiv.innerHTML = `✅ প্রস্তুত`;
                statusDiv.className = 'status';
            }
        }, 5000);
    }

    // ------------------- গ্লোবাল স্টেট -------------------
    let currentRoomId = null;
    let currentUserId = null;
    let localStream = null;
    let isMicActive = false;
    let peerConnections = new Map();      // targetUserId -> RTCPeerConnection
    let roomUsersRef = null;
    let activeListeners = [];
    const remoteAudios = new Map();        // targetUserId -> Audio element
    const remoteVolumeLevels = new Map();
    let localAnalyser = null;
    let animationId = null;

    // ------------------- ICE সার্ভার (STUN + ফ্রি TURN) -------------------
    const iceServers = [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
        { urls: 'stun:stun2.l.google.com:19302' },
        { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
        { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' }
    ];

    // ------------------- UI রেন্ডারিং (গোল বৃত্ত) -------------------
    function renderParticipants(usersList) {
        if (!usersList || usersList.length === 0) {
            participantGrid.innerHTML = '<div style="color:gray; text-align:center; width:100%;">কেউ নেই</div>';
            participantCountSpan.innerText = "0";
            return;
        }
        participantCountSpan.innerText = usersList.length;
        let html = '';
        for (let uid of usersList) {
            const isMe = (uid === currentUserId);
            html += `
                <div class="participant-circle" id="p-${uid}">
                    <div class="circle" id="circle-${uid}"><span style="font-size:28px;">${isMe ? '🎤' : '👤'}</span></div>
                    <div class="participant-name">${uid.length > 15 ? uid.substring(0,12)+'...' : uid} ${isMe ? '(আপনি)' : ''}</div>
                </div>
            `;
        }
        participantGrid.innerHTML = html;
        // পূর্বের ভলিউম স্টেট পুনরুদ্ধার
        for (let [uid, vol] of remoteVolumeLevels.entries()) {
            if (usersList.includes(uid)) updateCircleSpeaking(uid, vol > 0.05, vol);
        }
    }

    async function updateParticipantsList() {
        if (!currentRoomId) return;
        try {
            const snapshot = await database.ref(`voice_rooms/${currentRoomId}/users`).once('value');
            const users = snapshot.val() || {};
            renderParticipants(Object.keys(users));
        } catch (err) {
            showStatusMessage(`সদস্য লিস্ট লোড করতে ব্যর্থ: ${err.message}`, true);
        }
    }

    function updateCircleSpeaking(userId, isSpeaking, volume = 0) {
        const circle = document.getElementById(`circle-${userId}`);
        if (!circle) return;
        if (isSpeaking) {
            circle.classList.add('speaking');
            if (volume < 0.2) circle.style.borderColor = '#3b82f6';
            else if (volume < 0.5) circle.style.borderColor = '#f97316';
            else circle.style.borderColor = '#ef4444';
        } else {
            circle.classList.remove('speaking');
            circle.style.borderColor = '#4f46e5';
        }
    }

    // ------------------- ভলিউম ডিটেকশন (লোকাল ও রিমোট) -------------------
    function setupLocalVolumeDetection(stream) {
        if (localAnalyser) {
            if (animationId) cancelAnimationFrame(animationId);
        }
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioCtx.createMediaStreamSource(stream);
        const analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        const dataArray = new Uint8Array(analyser.frequencyBinCount);
        source.connect(analyser);
        localAnalyser = analyser;
        function update() {
            if (!localAnalyser || !currentUserId) return;
            localAnalyser.getByteFrequencyData(dataArray);
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
            let avg = sum / dataArray.length;
            let normalized = Math.min(1, avg / 150);
            updateCircleSpeaking(currentUserId, normalized > 0.05, normalized);
            animationId = requestAnimationFrame(update);
        }
        audioCtx.resume().then(() => {
            addDebugLog("লোকাল ভলিউম ডিটেক্টর শুরু হয়েছে");
            update();
        }).catch(e => {
            addDebugLog(`AudioContext resume ব্যর্থ: ${e.message}`, true);
        });
    }

    function setupRemoteVolumeDetection(audioElement, userId) {
        if (!audioElement) return;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioCtx.createMediaElementSource(audioElement);
        const analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        const dataArray = new Uint8Array(analyser.frequencyBinCount);
        source.connect(analyser);
        analyser.connect(audioCtx.destination);
        function update() {
            if (!analyser) return;
            analyser.getByteFrequencyData(dataArray);
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
            let avg = sum / dataArray.length;
            let normalized = Math.min(1, avg / 150);
            remoteVolumeLevels.set(userId, normalized);
            updateCircleSpeaking(userId, normalized > 0.05, normalized);
            requestAnimationFrame(update);
        }
        audioCtx.resume().then(() => {
            addDebugLog(`রিমোট ভলিউম ডিটেক্টর শুরু: ${userId}`);
            update();
        }).catch(e => {
            addDebugLog(`রিমোট AudioContext resume ব্যর্থ ${userId}: ${e.message}`, true);
        });
    }

    // ------------------- WebRTC পিয়ার সংযোগ -------------------
    async function createPeerConnection(targetUserId) {
        if (peerConnections.has(targetUserId)) return peerConnections.get(targetUserId);
        const pc = new RTCPeerConnection({ iceServers });
        if (localStream) {
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
        }
        pc.onicecandidate = (event) => {
            if (event.candidate) {
                database.ref(`voice_rooms/${currentRoomId}/candidates/${targetUserId}`).push({
                    from: currentUserId,
                    candidate: event.candidate
                }).catch(err => addDebugLog(`ICE candidate পাঠাতে ব্যর্থ: ${err.message}`, true));
                addDebugLog(`ICE candidate পাঠানো হয়েছে ${targetUserId}`);
            }
        };
        pc.ontrack = (event) => {
            addDebugLog(`📢 ontrack ফায়ার হয়েছে ${targetUserId} থেকে`);
            let audio = remoteAudios.get(targetUserId);
            if (!audio) {
                audio = new Audio();
                audio.autoplay = false;
                audio.style.display = 'none';
                document.body.appendChild(audio);
                remoteAudios.set(targetUserId, audio);
                setupRemoteVolumeDetection(audio, targetUserId);
            }
            audio.srcObject = event.streams[0];
            audio.play().catch(e => {
                addDebugLog(`অডিও প্লে ব্যর্থ ${targetUserId}: ${e.message}`, true);
                showStatusMessage(`${targetUserId} এর অডিও বাজাতে সমস্যা`, true);
            });
        };
        pc.onconnectionstatechange = () => {
            addDebugLog(`সংযোগ স্টেট ${targetUserId}: ${pc.connectionState}`);
            if (pc.connectionState === 'connected') {
                showStatusMessage(`${targetUserId} এর সাথে সংযুক্ত`);
            }
            if (pc.connectionState === 'failed') {
                showStatusMessage(`${targetUserId} এর সাথে সংযোগ ব্যর্থ। TURN সার্ভার প্রয়োজন হতে পারে।`, true);
                // পিয়ারটি মুছে ফেলা
                if (peerConnections.has(targetUserId)) peerConnections.delete(targetUserId);
                if (remoteAudios.has(targetUserId)) {
                    remoteAudios.get(targetUserId).srcObject = null;
                    remoteAudios.delete(targetUserId);
                }
                remoteVolumeLevels.delete(targetUserId);
                updateParticipantsList();
            }
            if (pc.connectionState === 'closed') {
                if (peerConnections.has(targetUserId)) peerConnections.delete(targetUserId);
                if (remoteAudios.has(targetUserId)) {
                    remoteAudios.get(targetUserId).srcObject = null;
                    remoteAudios.delete(targetUserId);
                }
                remoteVolumeLevels.delete(targetUserId);
                updateParticipantsList();
            }
        };
        pc.oniceconnectionstatechange = () => {
            addDebugLog(`ICE স্টেট ${targetUserId}: ${pc.iceConnectionState}`);
            if (pc.iceConnectionState === 'failed') {
                showStatusMessage(`${targetUserId} এর সাথে ICE সংযোগ ব্যর্থ`, true);
            }
        };
        peerConnections.set(targetUserId, pc);
        return pc;
    }

    async function startCallWith(targetUserId) {
        if (targetUserId === currentUserId || peerConnections.has(targetUserId)) return;
        addDebugLog(`কল শুরু হচ্ছে ${targetUserId} এর সাথে`);
        try {
            const pc = await createPeerConnection(targetUserId);
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            await database.ref(`voice_rooms/${currentRoomId}/offers/${targetUserId}`).push({
                from: currentUserId,
                offer: offer
            });
            addDebugLog(`Offer পাঠানো হয়েছে ${targetUserId}`);
        } catch (e) {
            addDebugLog(`Offer তৈরি/পাঠাতে ব্যর্থ ${targetUserId}: ${e.message}`, true);
            showStatusMessage(`${targetUserId} এ কল করতে ব্যর্থ`, true);
        }
    }

    // ------------------- সিগন্যালিং লিসেনার -------------------
    function setupSignalingListeners() {
        const offersRef = database.ref(`voice_rooms/${currentRoomId}/offers/${currentUserId}`);
        const offerListener = offersRef.on('child_added', async (snapshot) => {
            const data = snapshot.val();
            if (!data || data.from === currentUserId) return;
            const { from, offer } = data;
            addDebugLog(`Offer পেয়েছি ${from} থেকে`);
            try {
                let pc = peerConnections.get(from);
                if (!pc) pc = await createPeerConnection(from);
                await pc.setRemoteDescription(new RTCSessionDescription(offer));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                await database.ref(`voice_rooms/${currentRoomId}/answers/${from}`).push({
                    from: currentUserId,
                    answer: answer
                });
                addDebugLog(`Answer পাঠানো হয়েছে ${from} কে`);
                snapshot.ref.remove().catch(e => addDebugLog(`Offer রিমুভ ব্যর্থ: ${e.message}`, true));
            } catch (err) {
                addDebugLog(`Offer প্রসেস করতে ব্যর্থ: ${err.message}`, true);
            }
        });

        const answersRef = database.ref(`voice_rooms/${currentRoomId}/answers/${currentUserId}`);
        const answerListener = answersRef.on('child_added', async (snapshot) => {
            const data = snapshot.val();
            if (!data || data.from === currentUserId) return;
            const { from, answer } = data;
            const pc = peerConnections.get(from);
            if (pc && pc.remoteDescription === null) {
                try {
                    await pc.setRemoteDescription(new RTCSessionDescription(answer));
                    addDebugLog(`Answer সেট করা হয়েছে ${from} থেকে`);
                    snapshot.ref.remove().catch(e => addDebugLog(`Answer রিমুভ ব্যর্থ: ${e.message}`, true));
                } catch (err) {
                    addDebugLog(`Answer সেট করতে ব্যর্থ: ${err.message}`, true);
                }
            }
        });

        const candidatesRef = database.ref(`voice_rooms/${currentRoomId}/candidates/${currentUserId}`);
        const iceListener = candidatesRef.on('child_added', async (snapshot) => {
            const data = snapshot.val();
            if (!data || data.from === currentUserId) return;
            const { from, candidate } = data;
            const pc = peerConnections.get(from);
            if (pc && candidate) {
                try {
                    await pc.addIceCandidate(new RTCIceCandidate(candidate));
                    addDebugLog(`ICE ক্যান্ডিডেট যোগ হয়েছে ${from} থেকে`);
                } catch (e) {
                    addDebugLog(`ICE যোগ করতে ব্যর্থ: ${e.message}`, true);
                }
            }
        });

        activeListeners.push(() => {
            offersRef.off('child_added', offerListener);
            answersRef.off('child_added', answerListener);
            candidatesRef.off('child_added', iceListener);
        });
    }

    // ------------------- রুমের ইউজার ট্র্যাকিং -------------------
    function watchRoomUsers() {
        if (roomUsersRef) roomUsersRef.off();
        roomUsersRef = database.ref(`voice_rooms/${currentRoomId}/users`);
        roomUsersRef.on('child_added', async (snapshot) => {
            const uid = snapshot.key;
            if (uid === currentUserId) return;
            addDebugLog(`নতুন সদস্য এলেন: ${uid}`);
            updateParticipantsList();
            setTimeout(() => {
                if (localStream && !peerConnections.has(uid)) {
                    startCallWith(uid).catch(e => addDebugLog(`startCallWith ব্যর্থ: ${e.message}`, true));
                }
            }, 500);
        });
        roomUsersRef.on('child_removed', (snapshot) => {
            const uid = snapshot.key;
            addDebugLog(`সদস্য চলে গেলেন: ${uid}`);
            if (peerConnections.has(uid)) {
                peerConnections.get(uid).close();
                peerConnections.delete(uid);
            }
            if (remoteAudios.has(uid)) {
                remoteAudios.get(uid).srcObject = null;
                remoteAudios.delete(uid);
            }
            remoteVolumeLevels.delete(uid);
            updateParticipantsList();
            showStatusMessage(`${uid} রুম ছেড়েছেন।`);
        });
        roomUsersRef.on('error', (err) => {
            addDebugLog(`রুম ইউজার শুনতে সমস্যা: ${err.message}`, true);
            showStatusMessage(`রুমের সদস্য লোড করতে সমস্যা`, true);
        });
    }

    // ------------------- কল ছাড়া ও পরিষ্কার -------------------
    async function leaveCall() {
        if (!currentRoomId || !currentUserId) return;
        addDebugLog("কল ছাড়ার প্রক্রিয়া শুরু");
        if (animationId) cancelAnimationFrame(animationId);
        if (localAnalyser) localAnalyser = null;
        for (let [uid, pc] of peerConnections.entries()) {
            pc.close();
            if (remoteAudios.has(uid)) remoteAudios.get(uid).srcObject = null;
        }
        peerConnections.clear();
        remoteAudios.clear();
        remoteVolumeLevels.clear();
        if (localStream) {
            localStream.getTracks().forEach(t => t.stop());
            localStream = null;
        }
        isMicActive = false;
        micToggleBtn.innerText = '🎤 মাইক চালু';
        micToggleBtn.disabled = true;
        try {
            await database.ref(`voice_rooms/${currentRoomId}/users/${currentUserId}`).remove();
        } catch (err) {
            addDebugLog(`Firebase থেকে নিজেকে সরাতে ব্যর্থ: ${err.message}`, true);
        }
        activeListeners.forEach(clean => clean());
        activeListeners = [];
        currentRoomId = null;
        currentUserId = null;
        joinBtn.disabled = false;
        leaveBtn.disabled = true;
        showStatusMessage("কল ছেড়েছেন। আবার জয়েন করতে পারেন।");
        renderParticipants([]);
    }

    // ------------------- কল জয়েন (অডিও আনলক সহ) -------------------
    async function joinCall() {
        let room = roomInput.value.trim();
        let userId = userIdInput.value.trim();
        if (!room) {
            showStatusMessage("রুম আইডি দিন!", true);
            return;
        }
        if (!userId) {
            userId = "ব্যবহারকারী_" + Math.floor(Math.random() * 10000);
            userIdInput.value = userId;
        }
        currentRoomId = room;
        currentUserId = userId;
        joinBtn.disabled = true;
        leaveBtn.disabled = false;
        showStatusMessage("মাইক্রোফোন অনুমতি চাচ্ছি...");

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            localStream = stream;
            isMicActive = true;
            micToggleBtn.disabled = false;
            micToggleBtn.innerText = '🔇 মাইক বন্ধ';
            addDebugLog("মাইক্রোফোন অনুমতি প্রাপ্ত");

            // লোকাল ভলিউম ডিটেক্টর
            setupLocalVolumeDetection(stream);

            // অডিও আনলক করার জন্য সাইলেন্ট অডিও প্লে
            const silentAudio = new Audio();
            silentAudio.src = "data:audio/wav;base64,U3RlYWx0aCBpcyB0aGUgc291bmQgb2Ygc2lsZW5jZS4=";
            silentAudio.play().catch(e => addDebugLog("সাইলেন্ট অডিও প্লে ব্যর্থ (কিন্তু সমস্যা নেই)", false));

            // Firebase এ নিজের উপস্থিতি
            await database.ref(`voice_rooms/${currentRoomId}/users/${currentUserId}`).set(true);
            addDebugLog("Firebase এ নিজের উপস্থিতি নিবন্ধিত");

            setupSignalingListeners();
            watchRoomUsers();
            showStatusMessage("রুমে জয়েন করেছেন! এখন কথা বললে বৃত্ত ঘুরবে।");
            setTimeout(() => updateParticipantsList(), 500);
        } catch (err) {
            addDebugLog(`জয়েন করতে ব্যর্থ: ${err.message}`, true);
            showStatusMessage(`মাইক্রোফোন অনুমতি দেননি বা ত্রুটি: ${err.message}`, true);
            joinBtn.disabled = false;
            leaveBtn.disabled = true;
            currentRoomId = null;
            currentUserId = null;
            if (localStream) {
                localStream.getTracks().forEach(t => t.stop());
                localStream = null;
            }
        }
    }

    function toggleMic() {
        if (!localStream) return;
        const audioTrack = localStream.getAudioTracks()[0];
        if (audioTrack) {
            audioTrack.enabled = !audioTrack.enabled;
            isMicActive = audioTrack.enabled;
            micToggleBtn.innerText = isMicActive ? '🔇 মাইক বন্ধ' : '🎤 মাইক চালু';
            showStatusMessage(isMicActive ? "মাইক সক্রিয়" : "মাইক বন্ধ", false);
            addDebugLog(`মাইক ${isMicActive ? "চালু" : "বন্ধ"} করা হয়েছে`);
        }
    }

    // ------------------- অথেনটিকেশন ফাংশন -------------------
    function showAuthStatus(msg, isError = false) {
        authStatus.innerHTML = isError ? `❌ ${msg}` : `✅ ${msg}`;
        authStatus.className = `status ${isError ? 'error-notification' : 'success-notification'}`;
        addDebugLog(`Auth: ${msg}`, isError);
        setTimeout(() => {
            if (authStatus.innerHTML === `❌ ${msg}` || authStatus.innerHTML === `✅ ${msg}`) {
                authStatus.innerHTML = '';
                authStatus.className = 'status';
            }
        }, 4000);
    }

    loginBtn.onclick = async () => {
        const email = loginEmail.value.trim();
        const password = loginPassword.value.trim();
        if (!email || !password) {
            showAuthStatus("ইমেইল ও পাসওয়ার্ড দিন", true);
            return;
        }
        try {
            await auth.signInWithEmailAndPassword(email, password);
            showAuthStatus("লগইন সফল!");
        } catch (error) {
            showAuthStatus(error.message, true);
        }
    };

    signupBtn.onclick = async () => {
        const email = loginEmail.value.trim();
        const password = loginPassword.value.trim();
        if (!email || !password) {
            showAuthStatus("ইমেইল ও পাসওয়ার্ড দিন", true);
            return;
        }
        try {
            await auth.createUserWithEmailAndPassword(email, password);
            showAuthStatus("অ্যাকাউন্ট তৈরি ও লগইন সফল!");
        } catch (error) {
            showAuthStatus(error.message, true);
        }
    };

    logoutBtn.onclick = async () => {
        if (currentRoomId && currentUserId) await leaveCall();
        await auth.signOut();
        showAuthStatus("লগআউট হয়েছে");
    };

    auth.onAuthStateChanged(async (user) => {
        if (user) {
            authSection.classList.add('hidden');
            voiceSection.classList.remove('hidden');
            if (currentRoomId) await leaveCall();
            addDebugLog(`লগইন ব্যবহারকারী: ${user.email}`);
        } else {
            authSection.classList.remove('hidden');
            voiceSection.classList.add('hidden');
            if (localStream) localStream.getTracks().forEach(t => t.stop());
            peerConnections.forEach(pc => pc.close());
            peerConnections.clear();
            localStream = null;
            addDebugLog("লগআউট বা অথেনটিকেটেড নন");
        }
    });

    // ------------------- ইভেন্ট লিসেনার -------------------
    joinBtn.onclick = joinCall;
    leaveBtn.onclick = leaveCall;
    micToggleBtn.onclick = toggleMic;

    window.addEventListener('beforeunload', () => {
        if (currentRoomId && currentUserId) {
            database.ref(`voice_rooms/${currentRoomId}/users/${currentUserId}`).remove();
        }
        if (localStream) localStream.getTracks().forEach(t => t.stop());
        peerConnections.forEach(pc => pc.close());
    });
</script>
</body>
