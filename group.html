<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Premium - গ্রুপ ভয়েস কল (অটো জয়েন)</title>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #0f172a, #1e1b4b); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 48px; max-width: 950px; width: 100%; padding: 25px; border: 1px solid rgba(255,255,255,0.2); }
        h2 { text-align: center; color: #f0f0ff; margin-bottom: 15px; }
        button { width: 100%; padding: 12px 15px; border-radius: 60px; border: none; font-size: 1rem; margin-top: 8px; cursor: pointer; transition: 0.2s; font-weight: bold; }
        button:hover { opacity: 0.9; transform: scale(1.02); }
        .btn-google { background: #4285f4; color: white; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-danger { background: #ef4444; }
        .btn-success { background: #10b981; }
        .card { background: rgba(0,0,0,0.3); border-radius: 32px; padding: 18px; margin-bottom: 20px; }
        .status { background: rgba(0,0,0,0.6); border-radius: 60px; padding: 10px; text-align: center; color: #e2e8f0; margin: 10px 0; font-size: 0.9rem; }
        .participants-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 25px; margin-top: 20px; }
        .participant-circle { text-align: center; width: 100px; cursor: pointer; }
        .circle { width: 80px; height: 80px; border-radius: 50%; background: #2d2b55; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; border: 3px solid #4f46e5; transition: all 0.1s; }
        .circle.speaking { animation: pulseRotate 0.5s infinite alternate; border-color: #facc15; }
        @keyframes pulseRotate { 0% { transform: scale(1) rotate(0deg); } 100% { transform: scale(1.08) rotate(5deg); } }
        .participant-name { color: white; background: rgba(0,0,0,0.6); border-radius: 40px; padding: 4px; font-size: 0.8rem; word-break: break-word; }
        .flex-btns { display: flex; gap: 12px; }
        .hidden { display: none; }
        .mic-btn { background: #f59e0b; width: auto; padding: 5px 15px; }
        .test-btn { background: #3b82f6; width: auto; padding: 5px 10px; font-size: 0.8rem; margin-top: 5px; }
        .connection-badge { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 5px; }
        .badge-connected { background: #10b981; box-shadow: 0 0 5px #10b981; }
        .badge-disconnected { background: #ef4444; }
        .user-info { display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.4); padding: 8px 15px; border-radius: 60px; margin-bottom: 15px; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        .user-name { color: white; font-weight: bold; flex: 1; }
        .auto-join-note { font-size: 0.75rem; color: #a5f3c3; text-align: center; margin-top: 8px; }
    </style>
</head>
<body>
<div class="container" id="app">
    <!-- Login Section - Only Google Sign-In -->
    <div id="authSection">
        <h2>🔐 গ্রুপ ভয়েস কল - গুগল লগইন</h2>
        <div class="card">
            <button id="googleLoginBtn" class="btn-google">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" height="20" alt="Google"> 
                গুগল অ্যাকাউন্ট দিয়ে লগইন করুন
            </button>
        </div>
        <div id="authStatus" class="status"></div>
        <div class="auto-join-note">✅ লগইন করলে স্বয়ংক্রিয়ভাবে ভয়েস কল জয়েন করবেন</div>
    </div>

    <!-- Voice Call Section - Visible after login -->
    <div id="voiceSection" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
            <h2>🎙️ গ্রুপ ভয়েস কল</h2>
            <button id="logoutBtn" class="btn-danger" style="width: auto; padding: 8px 16px;">লগআউট</button>
        </div>
        <div class="user-info" id="userInfoArea">
            <img id="userAvatar" class="user-avatar" src="" alt="avatar">
            <span id="userDisplayName" class="user-name"></span>
            <span id="connectionStatusBadge" style="font-size:0.7rem; background:#10b981; padding:4px 8px; border-radius:20px;">সংযুক্ত</span>
        </div>
        <div class="card">
            <div class="flex-btns">
                <button id="leaveBtn" class="btn-danger">কল ছাড়ুন</button>
                <button id="rejoinBtn" class="btn-success" style="display:none;">পুনরায় জয়েন</button>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button id="testMicBtn" class="test-btn hidden">🎤 মাইক টেস্ট</button>
                <button id="forcePlayBtn" class="test-btn hidden">🔊 অডিও চালু করুন</button>
            </div>
        </div>
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <strong>👥 সদস্য (<span id="participantCount">0</span>)</strong>
                <button id="micToggle" class="mic-btn" disabled>🎤 মাইক চালু</button>
            </div>
            <div id="participantGrid" class="participants-grid"><div style="color:gray;">লোড হচ্ছে...</div></div>
        </div>
        <div class="auto-join-note" style="margin-top: 8px;">
            🎧 কথা বললে বৃত্ত ঘুরবে | 🔊 অডিও না শুনলে "অডিও চালু করুন" বাটনে ক্লিক করুন
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBt9t6mcjUtXxX2igAJdseuIIc8pP_QPEw",
        authDomain: "easy-premium.firebaseapp.com",
        databaseURL: "https://easy-premium-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "easy-premium",
        storageBucket: "easy-premium.firebasestorage.app",
        messagingSenderId: "155891252265",
        appId: "1:155891252265:web:77ab41de24231e8e5ef038"
    };
    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();
    const provider = new firebase.auth.GoogleAuthProvider();

    // DOM elements
    const authSection = document.getElementById('authSection');
    const voiceSection = document.getElementById('voiceSection');
    const authStatus = document.getElementById('authStatus');
    const googleLoginBtn = document.getElementById('googleLoginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const leaveBtn = document.getElementById('leaveBtn');
    const rejoinBtn = document.getElementById('rejoinBtn');
    const participantGrid = document.getElementById('participantGrid');
    const participantCountSpan = document.getElementById('participantCount');
    const micToggleBtn = document.getElementById('micToggle');
    const testMicBtn = document.getElementById('testMicBtn');
    const forcePlayBtn = document.getElementById('forcePlayBtn');
    const userAvatar = document.getElementById('userAvatar');
    const userDisplayName = document.getElementById('userDisplayName');
    const connectionStatusBadge = document.getElementById('connectionStatusBadge');

    // Voice call state
    let currentRoomId = "easy-premium-group";  // fixed room for automatic join
    let currentUserId = null;
    let localStream = null;
    let isMicActive = false;
    let peerConnections = new Map();
    let roomUsersRef = null;
    let remoteAudios = new Map();
    let localAnalyser = null, animFrame = null;
    let audioContext = null;
    let iceServers = [];
    let isInCall = false;
    let autoJoinAttempted = false;

    // Helper: log to console only
    function addLog(msg, isErr = false) {
        const time = new Date().toLocaleTimeString();
        if (isErr) console.error(`[${time}] ${msg}`);
        else console.log(`[${time}] ${msg}`);
    }

    function showStatus(msg, isErr = false) {
        addLog(msg, isErr);
        // Also show a temporary toast-like status in the authStatus area if visible? but we don't have a dedicated status div in voice section.
        // We'll just rely on console and maybe small badge.
        if (connectionStatusBadge) {
            connectionStatusBadge.innerText = isErr ? 'ত্রুটি' : 'OK';
            connectionStatusBadge.style.background = isErr ? '#ef4444' : '#10b981';
            setTimeout(() => {
                if (isInCall) connectionStatusBadge.innerText = 'সংযুক্ত';
                else connectionStatusBadge.innerText = 'বিচ্ছিন্ন';
            }, 2000);
        }
    }

    async function loadIceServers() {
        try {
            addLog("🔄 TURN ক্রেডেনশিয়াল লোড হচ্ছে...");
            const response = await fetch("https://easy-premium.metered.live/api/v1/turn/credentials?apiKey=546ad2772f911ebe6c4b6e0ae95f76ac36d3");
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            iceServers = Array.isArray(data) ? data : (data.iceServers || data);
            if (!iceServers || iceServers.length === 0) throw new Error("No TURN servers");
            addLog(`✅ TURN loaded (${iceServers.length} servers)`);
        } catch (e) {
            addLog(`❌ TURN fetch failed: ${e.message} → STUN fallback`, true);
            iceServers = [
                { urls: "stun:stun.l.google.com:19302" },
                { urls: "stun:stun1.l.google.com:19302" }
            ];
        }
    }

    function sanitizeUserId(id) {
        return id.replace(/[.#$\[\]\/]/g, '_').substring(0, 30);
    }

    function forcePlayAllAudios() {
        let played = 0;
        for (let [userId, audio] of remoteAudios) {
            if (audio && audio.paused) {
                audio.play().then(() => addLog(`🔊 ফোর্স প্লে: ${userId}`)).catch(e => addLog(`⚠️ প্লে ব্যর্থ ${userId}: ${e.message}`, true));
                played++;
            }
        }
        if (played === 0 && remoteAudios.size > 0) addLog(`ℹ️ সব অডিও ইতিমধ্যে প্লে হচ্ছে`);
    }

    async function testMicrophone() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const testCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = testCtx.createMediaStreamSource(stream);
            const analyser = testCtx.createAnalyser();
            source.connect(analyser);
            addLog("✅ মাইক টেস্ট শুরু (5 সেকেন্ড)");
            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            let maxVolume = 0;
            const interval = setInterval(() => {
                analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
                let avg = sum / dataArray.length;
                if (avg > maxVolume) maxVolume = avg;
                if (avg > 10) addLog(`🔊 ভলিউম: ${Math.floor(avg)}`);
            }, 100);
            setTimeout(() => {
                clearInterval(interval);
                stream.getTracks().forEach(t => t.stop());
                testCtx.close();
                addLog(`✅ টেস্ট শেষ। সর্বোচ্চ ভলিউম: ${Math.floor(maxVolume)}`);
                if (maxVolume < 20) addLog(`⚠️ মাইকের ভলিউম কম`, true);
            }, 5000);
        } catch(e) {
            addLog(`❌ মাইক টেস্ট ব্যর্থ: ${e.message}`, true);
        }
    }

    function updateParticipantsList(usersList) {
        if (!usersList || usersList.length === 0) {
            participantGrid.innerHTML = '<div style="color:gray; text-align:center;">কেউ নেই</div>';
            participantCountSpan.innerText = "0";
            return;
        }
        participantCountSpan.innerText = usersList.length;
        let html = '';
        for (let uid of usersList) {
            const isMe = (uid === currentUserId);
            const hasConnection = peerConnections.has(uid);
            const connectionBadge = hasConnection ? '<span class="connection-badge badge-connected"></span>' : '<span class="connection-badge badge-disconnected"></span>';
            html += `
                <div class="participant-circle" onclick="forcePlayAllAudios()">
                    <div class="circle" id="circle-${uid}"><span style="font-size:28px;">${isMe ? '🎤' : '👤'}</span></div>
                    <div class="participant-name">${connectionBadge}${uid.substring(0, 12)}${isMe ? ' (আপনি)' : ''}</div>
                </div>
            `;
        }
        participantGrid.innerHTML = html;
    }

    function updateCircleSpeaking(userId, isSpeaking) {
        const circle = document.getElementById(`circle-${userId}`);
        if (circle) {
            if (isSpeaking) circle.classList.add('speaking');
            else circle.classList.remove('speaking');
        }
    }

    function setupLocalVolumeDetection(stream) {
        if (localAnalyser && animFrame) cancelAnimationFrame(animFrame);
        if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioContext.createMediaStreamSource(stream);
        const analyser = audioContext.createAnalyser();
        analyser.fftSize = 256;
        const dataArray = new Uint8Array(analyser.frequencyBinCount);
        source.connect(analyser);
        localAnalyser = analyser;
        audioContext.resume().then(() => {
            addLog("🔊 লোকাল মাইক ডিটেক্টর চালু");
            function update() {
                if (!localAnalyser || !currentUserId) return;
                localAnalyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
                let avg = sum / dataArray.length;
                let isSpeakingNow = avg > 15;
                if (isSpeakingNow && avg > 45 && Math.random() < 0.05) addLog(`🗣️ কথা বলছেন (ভলিউম: ${Math.floor(avg)})`);
                updateCircleSpeaking(currentUserId, isSpeakingNow);
                animFrame = requestAnimationFrame(update);
            }
            update();
        }).catch(e => addLog(`AudioContext resume failed: ${e.message}`, true));
    }

    async function createPeerConnection(targetUserId) {
        if (peerConnections.has(targetUserId)) return peerConnections.get(targetUserId);
        addLog(`🔌 সংযোগ তৈরি: ${targetUserId}`);
        const pc = new RTCPeerConnection({ iceServers: iceServers, iceTransportPolicy: 'relay' });
        if (localStream) localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
        pc.onicecandidate = (event) => {
            if (event.candidate) {
                db.ref(`voice_rooms/${currentRoomId}/candidates/${targetUserId}`).push({
                    from: currentUserId,
                    candidate: event.candidate
                }).catch(e => addLog(`ICE save failed: ${e.message}`, true));
            }
        };
        pc.ontrack = (event) => {
            addLog(`📢 রিমোট ট্র্যাক ${targetUserId}`);
            let audio = remoteAudios.get(targetUserId);
            if (!audio) {
                audio = new Audio();
                audio.autoplay = false;
                audio.style.display = 'none';
                audio.volume = 1.0;
                document.body.appendChild(audio);
                remoteAudios.set(targetUserId, audio);
            }
            audio.srcObject = event.streams[0];
            setTimeout(() => {
                audio.play().catch(e => addLog(`⚠️ অডিও প্লে ব্যর্থ ${targetUserId}: ${e.message}`, true));
            }, 100);
        };
        pc.onconnectionstatechange = () => {
            addLog(`🔗 সংযোগ স্টেট ${targetUserId}: ${pc.connectionState}`);
            if (pc.connectionState === 'connected') updateParticipantsList(Array.from(peerConnections.keys()).concat([currentUserId]));
            else if (pc.connectionState === 'failed') peerConnections.delete(targetUserId);
        };
        peerConnections.set(targetUserId, pc);
        return pc;
    }

    async function callUser(targetUserId) {
        if (targetUserId === currentUserId || peerConnections.has(targetUserId)) return;
        addLog(`📞 কল করছি ${targetUserId}`);
        try {
            const pc = await createPeerConnection(targetUserId);
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            await db.ref(`voice_rooms/${currentRoomId}/offers/${targetUserId}`).push({
                from: currentUserId,
                offer: { type: offer.type, sdp: offer.sdp }
            });
        } catch(e) { addLog(`Offer ব্যর্থ: ${e.message}`, true); }
    }

    function setupListeners() {
        const offerRef = db.ref(`voice_rooms/${currentRoomId}/offers/${currentUserId}`);
        offerRef.on('child_added', async (snapshot) => {
            const data = snapshot.val();
            if (!data || data.from === currentUserId) return;
            addLog(`📨 Offer from ${data.from}`);
            try {
                let pc = peerConnections.get(data.from);
                if (!pc) pc = await createPeerConnection(data.from);
                await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                await db.ref(`voice_rooms/${currentRoomId}/answers/${data.from}`).push({
                    from: currentUserId,
                    answer: { type: answer.type, sdp: answer.sdp }
                });
                await snapshot.ref.remove();
            } catch(e) { addLog(`Offer process error: ${e.message}`, true); }
        });

        const answerRef = db.ref(`voice_rooms/${currentRoomId}/answers/${currentUserId}`);
        answerRef.on('child_added', async (snapshot) => {
            const data = snapshot.val();
            if (!data || data.from === currentUserId) return;
            const pc = peerConnections.get(data.from);
            if (pc && pc.signalingState === 'have-local-offer') {
                try {
                    await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
                    await snapshot.ref.remove();
                } catch(e) { addLog(`Answer set failed: ${e.message}`, true); }
            }
        });

        const candidateRef = db.ref(`voice_rooms/${currentRoomId}/candidates/${currentUserId}`);
        candidateRef.on('child_added', async (snapshot) => {
            const data = snapshot.val();
            if (!data || data.from === currentUserId) return;
            const pc = peerConnections.get(data.from);
            if (pc && data.candidate) {
                try {
                    await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
                    await snapshot.ref.remove();
                } catch(e) { addLog(`ICE add failed: ${e.message}`, true); }
            }
        });
    }

    async function joinCall() {
        if (!currentUserId) return;
        if (isInCall) {
            addLog("Already in call, leaving first...");
            await leaveCall(false); // cleanup but keep logged in
        }
        isInCall = true;
        autoJoinAttempted = true;
        leaveBtn.disabled = false;
        rejoinBtn.style.display = 'none';
        showStatus("মাইক্রোফোন অনুমতি নিচ্ছি...");
        if (!iceServers.length) await loadIceServers();
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } });
            isMicActive = true;
            micToggleBtn.disabled = false;
            micToggleBtn.innerText = '🔇 মাইক বন্ধ';
            testMicBtn.classList.remove('hidden');
            forcePlayBtn.classList.remove('hidden');
            setupLocalVolumeDetection(localStream);
            await db.ref(`voice_rooms/${currentRoomId}/users/${currentUserId}`).set({ joined: Date.now(), name: currentUserId });
            setupListeners();
            const usersSnapshot = await db.ref(`voice_rooms/${currentRoomId}/users`).once('value');
            const users = usersSnapshot.val() || {};
            const otherUsers = Object.keys(users).filter(uid => uid !== currentUserId);
            for (let uid of otherUsers) setTimeout(() => callUser(uid), 500);
            const newUserRef = db.ref(`voice_rooms/${currentRoomId}/users`);
            newUserRef.on('child_added', (snap) => {
                const uid = snap.key;
                if (uid !== currentUserId && !peerConnections.has(uid)) setTimeout(() => callUser(uid), 300);
                updateParticipantsList(Array.from(peerConnections.keys()).concat([currentUserId]));
            });
            newUserRef.on('child_removed', (snap) => {
                const uid = snap.key;
                if (peerConnections.has(uid)) { peerConnections.get(uid).close(); peerConnections.delete(uid); }
                if (remoteAudios.has(uid)) { remoteAudios.get(uid).remove(); remoteAudios.delete(uid); }
                updateParticipantsList(Array.from(peerConnections.keys()).concat([currentUserId]));
            });
            roomUsersRef = newUserRef;
            updateParticipantsList(otherUsers.concat([currentUserId]));
            showStatus("✅ রুমে জয়েন করেছেন! কথা বলুন");
            connectionStatusBadge.innerText = "কল সক্রিয়";
            connectionStatusBadge.style.background = "#10b981";
        } catch(err) {
            addLog(`❌ জয়েন ব্যর্থ: ${err.message}`, true);
            showStatus(`মাইক অনুমতি প্রয়োজন: ${err.message}`, true);
            isInCall = false;
            leaveBtn.disabled = true;
            rejoinBtn.style.display = 'block';
            micToggleBtn.disabled = true;
        }
    }

    async function leaveCall(keepUserCleanup = true) {
        if (!currentUserId || !isInCall) return;
        addLog("🚪 কল ছাড়ছি...");
        if (animFrame) cancelAnimationFrame(animFrame);
        for (let [uid, pc] of peerConnections) { pc.close(); }
        peerConnections.clear();
        remoteAudios.forEach(audio => audio.remove());
        remoteAudios.clear();
        if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
        if (roomUsersRef && keepUserCleanup) {
            await db.ref(`voice_rooms/${currentRoomId}/users/${currentUserId}`).remove();
            roomUsersRef.off();
        }
        isInCall = false;
        micToggleBtn.disabled = true;
        testMicBtn.classList.add('hidden');
        forcePlayBtn.classList.add('hidden');
        participantGrid.innerHTML = '<div style="color:gray;">কল ছেড়েছেন</div>';
        participantCountSpan.innerText = "0";
        leaveBtn.disabled = true;
        rejoinBtn.style.display = 'block';
        connectionStatusBadge.innerText = "কল ছেড়েছেন";
        connectionStatusBadge.style.background = "#6b7280";
        showStatus("কল ছেড়েছেন");
    }

    function toggleMic() {
        if (!localStream) return;
        const audioTrack = localStream.getAudioTracks()[0];
        if (audioTrack) {
            audioTrack.enabled = !audioTrack.enabled;
            isMicActive = audioTrack.enabled;
            micToggleBtn.innerText = isMicActive ? '🔇 মাইক বন্ধ' : '🎤 মাইক চালু';
            showStatus(isMicActive ? "মাইক চালু" : "মাইক বন্ধ");
        }
    }

    // Google Sign-In
    googleLoginBtn.onclick = async () => {
        googleLoginBtn.disabled = true;
        googleLoginBtn.innerText = "লগইন হচ্ছে...";
        try {
            const result = await auth.signInWithPopup(provider);
            const user = result.user;
            addLog(`✅ গুগল লগইন সফল: ${user.displayName} (${user.email})`);
            authStatus.innerHTML = `✅ স্বাগতম, ${user.displayName}! কল শুরু হচ্ছে...`;
            authStatus.style.background = "#c6f6d5";
        } catch (error) {
            addLog(`❌ গুগল লগইন ব্যর্থ: ${error.message}`, true);
            authStatus.innerHTML = `❌ লগইন ব্যর্থ: ${error.message}`;
            authStatus.style.background = "#fed7d7";
            googleLoginBtn.disabled = false;
            googleLoginBtn.innerText = "গুগল অ্যাকাউন্ট দিয়ে লগইন করুন";
        }
    };

    logoutBtn.onclick = async () => {
        if (isInCall) await leaveCall(true);
        await auth.signOut();
    };

    leaveBtn.onclick = () => leaveCall(true);
    rejoinBtn.onclick = () => joinCall();
    micToggleBtn.onclick = toggleMic;
    testMicBtn.onclick = testMicrophone;
    forcePlayBtn.onclick = forcePlayAllAudios;
    window.forcePlayAllAudios = forcePlayAllAudios;

    // Auth state handler
    auth.onAuthStateChanged(async (user) => {
        if (user) {
            // User logged in with Google
            authSection.classList.add('hidden');
            voiceSection.classList.remove('hidden');
            // Set currentUserId from Google display name or email (sanitized)
            let rawName = user.displayName || user.email.split('@')[0];
            currentUserId = sanitizeUserId(rawName + "_" + user.uid.substring(0, 6));
            userDisplayName.innerText = rawName;
            userAvatar.src = user.photoURL || "https://ui-avatars.com/api/?background=8b5cf6&color=fff&name=" + encodeURIComponent(rawName);
            // Auto join call
            if (!isInCall && !autoJoinAttempted) {
                await joinCall();
            } else if (!isInCall && autoJoinAttempted) {
                // manual rejoin button available
                rejoinBtn.style.display = 'block';
            }
        } else {
            // Not logged in
            authSection.classList.remove('hidden');
            voiceSection.classList.add('hidden');
            if (isInCall) await leaveCall(false);
            currentUserId = null;
            autoJoinAttempted = false;
            googleLoginBtn.disabled = false;
            googleLoginBtn.innerText = "গুগল অ্যাকাউন্ট দিয়ে লগইন করুন";
            authStatus.innerHTML = '';
        }
    });

    // Preload TURN servers
    loadIceServers();
</script>
</body>
</html>
