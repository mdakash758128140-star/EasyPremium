<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Easy Premium - ভয়েস কল ও ভিজুয়ালাইজার</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
            max-width: 900px;
            width: 100%;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1, h2 {
            text-align: center;
            color: #f0f0ff;
            margin-bottom: 15px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        .input-group {
            margin-bottom: 16px;
        }
        input, button {
            width: 100%;
            padding: 12px 15px;
            border-radius: 60px;
            border: none;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }
        input {
            background: rgba(255,255,255,0.9);
            border: 1px solid #ccc;
        }
        input:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 2px rgba(139,92,246,0.3);
        }
        button {
            background: #8b5cf6;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
        }
        button:hover {
            background: #7c3aed;
            transform: scale(0.98);
        }
        .btn-secondary {
            background: #10b981;
        }
        .btn-secondary:hover {
            background: #059669;
        }
        .btn-danger {
            background: #ef4444;
        }
        .btn-danger:hover {
            background: #dc2626;
        }
        .card {
            background: rgba(0,0,0,0.3);
            border-radius: 32px;
            padding: 18px;
            margin-bottom: 20px;
            backdrop-filter: blur(5px);
        }
        .status {
            background: rgba(0,0,0,0.5);
            border-radius: 60px;
            padding: 8px 15px;
            text-align: center;
            font-size: 0.85rem;
            margin: 15px 0;
            color: #e2e8f0;
        }
        .participants-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
            min-height: 250px;
        }
        .participant-circle {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            width: 110px;
            cursor: default;
            transition: all 0.2s;
        }
        .circle {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(145deg, #2d2b55, #1e1b4b);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            transition: all 0.1s ease;
            border: 3px solid #4f46e5;
            position: relative;
        }
        /* অ্যানিমেশন: কথা বললে ঘূর্ণন */
        .circle.speaking {
            animation: pulseRotate 0.6s infinite alternate ease-in-out;
            border-color: #facc15;
            box-shadow: 0 0 15px #facc15;
        }
        @keyframes pulseRotate {
            0% {
                transform: scale(1) rotate(0deg);
                box-shadow: 0 0 5px #facc15;
            }
            100% {
                transform: scale(1.08) rotate(6deg);
                box-shadow: 0 0 20px #facc15;
            }
        }
        /* ভলিউম লেভেল অনুযায়ী সাইজ পরিবর্তন (অতিরিক্ত) */
        .circle.volume-low {
            border-color: #3b82f6;
        }
        .circle.volume-medium {
            border-color: #f97316;
            transform: scale(1.02);
        }
        .circle.volume-high {
            border-color: #ef4444;
            transform: scale(1.05);
            animation: pulseRotate 0.3s infinite alternate;
        }
        .participant-name {
            font-weight: bold;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.85rem;
            text-align: center;
            max-width: 110px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .badge-mic {
            font-size: 0.7rem;
            background: #22c55e;
            padding: 2px 8px;
            border-radius: 20px;
            color: white;
        }
        .footer {
            font-size: 0.7rem;
            text-align: center;
            color: #aaa;
            margin-top: 25px;
        }
        .flex-btns {
            display: flex;
            gap: 12px;
        }
        .hidden {
            display: none;
        }
        .mic-btn {
            background: #f59e0b;
            width: auto;
            padding: 5px 15px;
            margin-top: 0;
        }
        @media (max-width: 650px) {
            .participant-circle { width: 80px; }
            .circle { width: 70px; height: 70px; }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <!-- লগইন / রেজিস্টার সেকশন -->
    <div id="authSection">
        <h2>🔐 লগইন বা রেজিস্টার করুন</h2>
        <div class="card">
            <div class="input-group">
                <input type="email" id="loginEmail" placeholder="ইমেইল">
            </div>
            <div class="input-group">
                <input type="password" id="loginPassword" placeholder="পাসওয়ার্ড">
            </div>
            <button id="loginBtn">লগইন</button>
            <button id="signupBtn" class="btn-secondary" style="margin-top: 10px;">নতুন অ্যাকাউন্ট তৈরি করুন</button>
        </div>
        <div id="authStatus" class="status"></div>
    </div>

    <!-- ভয়েস কল সেকশন -->
    <div id="voiceSection" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>🎙️ গ্রুপ ভয়েস কল</h2>
            <button id="logoutBtn" class="btn-danger" style="width: auto; padding: 8px 16px;">লগআউট</button>
        </div>
        <div class="card">
            <div class="input-group">
                <input type="text" id="roomId" placeholder="রুম আইডি" value="easy-premium-group">
            </div>
            <div class="input-group">
                <input type="text" id="userId" placeholder="আপনার নাম (ইউনিক)">
            </div>
            <div class="flex-btns">
                <button id="joinBtn">🔊 জয়েন করুন</button>
                <button id="leaveBtn" class="btn-danger" disabled>🚪 কল ছাড়ুন</button>
            </div>
        </div>
        <div id="statusArea" class="status">⚡ সংযোগ শুরু হয়নি</div>
        
        <!-- ভিজুয়ালাইজার এলাকা: গোল বৃত্ত আকারে সদস্যরা -->
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <strong style="color:white;">👥 রুমের সদস্য (<span id="participantCount">0</span>)</strong>
                <button id="micToggle" class="mic-btn" disabled>🎤 মাইক চালু</button>
            </div>
            <div id="participantGrid" class="participants-grid">
                <!-- ডায়নামিক সার্কেল এখানে আসবে -->
                <div style="color:gray; text-align:center; width:100%;">কেউ নেই</div>
            </div>
        </div>
        <div class="footer">
            🎧 কথা বললে আপনার বৃত্তটি ঘুরবে। অন্যদের বৃত্তও তাদের ভলিউম অনুযায়ী সাড়া দেবে।
        </div>
    </div>
</div>

<script>
    // ------------------- Firebase কনফিগারেশন -------------------
    const firebaseConfig = {
        apiKey: "AIzaSyBt9t6mcjUtXxX2igAJdseuIIc8pP_QPEw",
        authDomain: "easy-premium.firebaseapp.com",
        databaseURL: "https://easy-premium-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "easy-premium",
        storageBucket: "easy-premium.firebasestorage.app",
        messagingSenderId: "155891252265",
        appId: "1:155891252265:web:77ab41de24231e8e5ef038"
    };
    const app = firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();

    // ------------------- DOM এলিমেন্টস -------------------
    const authSection = document.getElementById('authSection');
    const voiceSection = document.getElementById('voiceSection');
    const authStatus = document.getElementById('authStatus');
    const loginEmail = document.getElementById('loginEmail');
    const loginPassword = document.getElementById('loginPassword');
    const loginBtn = document.getElementById('loginBtn');
    const signupBtn = document.getElementById('signupBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const roomInput = document.getElementById('roomId');
    const userIdInput = document.getElementById('userId');
    const joinBtn = document.getElementById('joinBtn');
    const leaveBtn = document.getElementById('leaveBtn');
    const statusDiv = document.getElementById('statusArea');
    const participantGrid = document.getElementById('participantGrid');
    const participantCountSpan = document.getElementById('participantCount');
    const micToggleBtn = document.getElementById('micToggle');

    // ------------------- গ্লোবাল স্টেট -------------------
    let currentRoomId = null;
    let currentUserId = null;
    let localStream = null;
    let isMicActive = false;
    let peerConnections = new Map();      // targetUserId -> RTCPeerConnection
    let roomUsersRef = null;
    let activeListeners = [];
    const remoteAudios = new Map();        // targetUserId -> Audio element
    
    // ভলিউম ডিটেকশনের জন্য AnalyserNode (শুধু লোকাল স্ট্রিমের জন্য)
    let localAnalyser = null;
    let localAnimationFrame = null;
    // রিমোট ইউজারদের জন্য ভলিউম লেভেল ট্র্যাকিং (key: userId, value: volume level 0-1)
    let remoteVolumeLevels = new Map();
    
    // লোকাল মাইকের ভলিউম লেভেল আপডেট করে UI তে নিজের বৃত্ত ঘোরানো
    function setupLocalVolumeDetection(stream) {
        if (localAnalyser) {
            // আগেরটা ক্লিনআপ
            if (localAnimationFrame) cancelAnimationFrame(localAnimationFrame);
        }
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioContext.createMediaStreamSource(stream);
        const analyser = audioContext.createAnalyser();
        analyser.fftSize = 256;
        const dataArray = new Uint8Array(analyser.frequencyBinCount);
        source.connect(analyser);
        localAnalyser = analyser;
        
        function updateVolume() {
            if (!localAnalyser || !currentUserId) return;
            localAnalyser.getByteFrequencyData(dataArray);
            // গড় ভলিউম বের করা
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
            let avg = sum / (dataArray.length || 1);
            let normalized = Math.min(1, avg / 150); // 0-1 scale
            // নিজের বৃত্ত আপডেট
            updateCircleSpeaking(currentUserId, normalized > 0.05, normalized);
            localAnimationFrame = requestAnimationFrame(updateVolume);
        }
        // অডিও কনটেক্সট শুরু করতে হবে (ইউজার অ্যাকশনে)
        audioContext.resume().then(() => {
            updateVolume();
        }).catch(e => console.warn("AudioContext resume failed", e));
    }
    
    // রিমোট স্ট্রিমের জন্য ভলিউম ডিটেকশন (প্রতি পিয়ার ট্র্যাক আসার পর)
    function setupRemoteVolumeDetection(audioElement, userId) {
        if (!audioElement) return;
        // AudioContext তৈরি করে analyser সংযুক্ত করা
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioContext.createMediaElementSource(audioElement);
        const analyser = audioContext.createAnalyser();
        analyser.fftSize = 256;
        const dataArray = new Uint8Array(analyser.frequencyBinCount);
        source.connect(analyser);
        analyser.connect(audioContext.destination); // শব্দ বাজানোর জন্য
        
        function updateRemoteVolume() {
            if (!analyser || !userId) return;
            analyser.getByteFrequencyData(dataArray);
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
            let avg = sum / (dataArray.length || 1);
            let normalized = Math.min(1, avg / 150);
            remoteVolumeLevels.set(userId, normalized);
            updateCircleSpeaking(userId, normalized > 0.05, normalized);
            requestAnimationFrame(updateRemoteVolume);
        }
        audioContext.resume().then(() => {
            updateRemoteVolume();
        }).catch(e => console.warn("Remote audio context resume", e));
    }
    
    // UI তে বৃত্ত আপডেট (কথা বললে ঘূর্ণন + ভলিউম ক্লাস)
    function updateCircleSpeaking(userId, isSpeaking, volume = 0) {
        const circleDiv = document.getElementById(`circle-${userId}`);
        if (!circleDiv) return;
        if (isSpeaking) {
            circleDiv.classList.add('speaking');
            // ভলিউম লেভেল অনুযায়ী অতিরিক্ত ক্লাস
            circleDiv.classList.remove('volume-low', 'volume-medium', 'volume-high');
            if (volume < 0.2) circleDiv.classList.add('volume-low');
            else if (volume < 0.5) circleDiv.classList.add('volume-medium');
            else circleDiv.classList.add('volume-high');
        } else {
            circleDiv.classList.remove('speaking', 'volume-low', 'volume-medium', 'volume-high');
        }
    }
    
    // UI রেন্ডার: সদস্যদের গোল বৃত্ত আকারে দেখানো
    function renderParticipants(usersList) {
        if (!usersList || usersList.length === 0) {
            participantGrid.innerHTML = '<div style="color:gray; text-align:center; width:100%;">কেউ নেই</div>';
            participantCountSpan.innerText = "0";
            return;
        }
        participantCountSpan.innerText = usersList.length;
        let html = '';
        for (let uid of usersList) {
            const isMe = (uid === currentUserId);
            const displayName = uid.length > 15 ? uid.substring(0,12)+'...' : uid;
            html += `
                <div class="participant-circle" id="participant-${uid}">
                    <div class="circle" id="circle-${uid}">
                        <span style="font-size:30px;">${isMe ? '🎤' : '👤'}</span>
                    </div>
                    <div class="participant-name">${displayName} ${isMe ? '(আপনি)' : ''}</div>
                    ${!isMe ? '<div class="badge-mic">🔊 সংযুক্ত</div>' : ''}
                </div>
            `;
        }
        participantGrid.innerHTML = html;
        // আগের ভলিউম স্টেট রিস্টোর (যাদের volume জানা আছে)
        for (let [uid, vol] of remoteVolumeLevels.entries()) {
            if (usersList.includes(uid)) {
                updateCircleSpeaking(uid, vol > 0.05, vol);
            }
        }
        if (currentUserId && localAnalyser) {
            // লোকাল ভলিউম আপডেট চলতেই থাকবে
        }
    }
    
    async function updateParticipantsList() {
        if (!currentRoomId) return;
        const snapshot = await database.ref(`voice_rooms/${currentRoomId}/users`).once('value');
        const users = snapshot.val() || {};
        const userIds = Object.keys(users);
        renderParticipants(userIds);
    }
    
    // ---------- WebRTC সিগন্যালিং (আগের মতোই) ----------
    function updateStatus(msg, isError = false) {
        statusDiv.innerHTML = isError ? `❌ ${msg}` : `✅ ${msg}`;
        statusDiv.style.background = isError ? 'rgba(220,38,38,0.3)' : 'rgba(34,197,94,0.3)';
        setTimeout(() => {
            if (!isError && currentRoomId) statusDiv.innerHTML = `🎤 রুম: ${currentRoomId}`;
            else if (!isError) statusDiv.innerHTML = `✅ ${msg}`;
        }, 3000);
    }
    
    const iceServers = [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
        { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
        { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' }
    ];
    
    async function createPeerConnection(targetUserId) {
        if (peerConnections.has(targetUserId)) return peerConnections.get(targetUserId);
        const pc = new RTCPeerConnection({ iceServers });
        if (localStream) {
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
        }
        pc.onicecandidate = (event) => {
            if (event.candidate) {
                database.ref(`voice_rooms/${currentRoomId}/candidates/${targetUserId}`).push({
                    from: currentUserId,
                    candidate: event.candidate
                });
            }
        };
        pc.ontrack = (event) => {
            console.log(`Track from ${targetUserId}`);
            let audioEl = remoteAudios.get(targetUserId);
            if (!audioEl) {
                audioEl = new Audio();
                audioEl.autoplay = false;
                audioEl.style.display = 'none';
                document.body.appendChild(audioEl);
                remoteAudios.set(targetUserId, audioEl);
                // ভলিউম ডিটেক্টর সেটআপ
                setupRemoteVolumeDetection(audioEl, targetUserId);
            }
            audioEl.srcObject = event.streams[0];
            audioEl.play().catch(e => console.warn(`Play error ${targetUserId}`, e));
        };
        pc.onconnectionstatechange = () => {
            if (pc.connectionState === 'connected') updateStatus(`${targetUserId} সংযুক্ত`);
            if (pc.connectionState === 'failed' || pc.connectionState === 'closed') {
                if (peerConnections.has(targetUserId)) peerConnections.delete(targetUserId);
                if (remoteAudios.has(targetUserId)) {
                    remoteAudios.get(targetUserId).srcObject = null;
                    remoteAudios.delete(targetUserId);
                }
                remoteVolumeLevels.delete(targetUserId);
                updateParticipantsList();
            }
        };
        peerConnections.set(targetUserId, pc);
        return pc;
    }
    
    async function startCallWith(targetUserId) {
        if (targetUserId === currentUserId || peerConnections.has(targetUserId)) return;
        try {
            const pc = await createPeerConnection(targetUserId);
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            await database.ref(`voice_rooms/${currentRoomId}/offers/${targetUserId}`).push({
                from: currentUserId,
                offer: offer
            });
        } catch(e) { console.error(e); }
    }
    
    function setupSignalingListeners() {
        const offersRef = database.ref(`voice_rooms/${currentRoomId}/offers/${currentUserId}`);
        const offerListener = offersRef.on('child_added', async (snapshot) => {
            const data = snapshot.val();
            if (!data || data.from === currentUserId) return;
            const { from, offer } = data;
            let pc = peerConnections.get(from);
            if (!pc) pc = await createPeerConnection(from);
            await pc.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            await database.ref(`voice_rooms/${currentRoomId}/answers/${from}`).push({
                from: currentUserId,
                answer: answer
            });
            snapshot.ref.remove();
        });
        const answersRef = database.ref(`voice_rooms/${currentRoomId}/answers/${currentUserId}`);
        const answerListener = answersRef.on('child_added', async (snapshot) => {
            const data = snapshot.val();
            if (!data || data.from === currentUserId) return;
            const { from, answer } = data;
            const pc = peerConnections.get(from);
            if (pc && pc.remoteDescription === null) {
                await pc.setRemoteDescription(new RTCSessionDescription(answer));
                snapshot.ref.remove();
            }
        });
        const candidatesRef = database.ref(`voice_rooms/${currentRoomId}/candidates/${currentUserId}`);
        const iceListener = candidatesRef.on('child_added', async (snapshot) => {
            const data = snapshot.val();
            if (!data || data.from === currentUserId) return;
            const { from, candidate } = data;
            const pc = peerConnections.get(from);
            if (pc && candidate) {
                try { await pc.addIceCandidate(new RTCIceCandidate(candidate)); } catch(e) {}
            }
        });
        activeListeners.push(() => {
            offersRef.off('child_added', offerListener);
            answersRef.off('child_added', answerListener);
            candidatesRef.off('child_added', iceListener);
        });
    }
    
    function watchRoomUsers() {
        if (roomUsersRef) roomUsersRef.off();
        roomUsersRef = database.ref(`voice_rooms/${currentRoomId}/users`);
        roomUsersRef.on('child_added', async (snapshot) => {
            const uid = snapshot.key;
            if (uid === currentUserId) return;
            updateParticipantsList();
            setTimeout(() => {
                if (localStream && !peerConnections.has(uid)) startCallWith(uid);
            }, 500);
        });
        roomUsersRef.on('child_removed', (snapshot) => {
            const uid = snapshot.key;
            if (peerConnections.has(uid)) {
                peerConnections.get(uid).close();
                peerConnections.delete(uid);
            }
            if (remoteAudios.has(uid)) {
                remoteAudios.get(uid).srcObject = null;
                remoteAudios.delete(uid);
            }
            remoteVolumeLevels.delete(uid);
            updateParticipantsList();
            updateStatus(`${uid} রুম ছেড়েছেন।`);
        });
    }
    
    async function leaveCall() {
        if (!currentRoomId || !currentUserId) return;
        if (localAnimationFrame) cancelAnimationFrame(localAnimationFrame);
        if (localAnalyser) localAnalyser = null;
        for (let [uid, pc] of peerConnections.entries()) {
            pc.close();
            if (remoteAudios.has(uid)) remoteAudios.get(uid).srcObject = null;
        }
        peerConnections.clear();
        remoteAudios.clear();
        remoteVolumeLevels.clear();
        if (localStream) {
            localStream.getTracks().forEach(t => t.stop());
            localStream = null;
        }
        isMicActive = false;
        micToggleBtn.innerText = '🎤 মাইক চালু';
        micToggleBtn.disabled = true;
        await database.ref(`voice_rooms/${currentRoomId}/users/${currentUserId}`).remove().catch(e=>console.warn);
        activeListeners.forEach(clean => clean());
        activeListeners = [];
        currentRoomId = null;
        currentUserId = null;
        joinBtn.disabled = false;
        leaveBtn.disabled = true;
        updateStatus("কল ছেড়েছেন");
        renderParticipants([]);
    }
    
    async function joinCall() {
        let room = roomInput.value.trim();
        let userId = userIdInput.value.trim();
        if (!room) { updateStatus("রুম আইডি দিন", true); return; }
        if (!userId) {
            userId = "User_" + Math.floor(Math.random()*10000);
            userIdInput.value = userId;
        }
        currentRoomId = room;
        currentUserId = userId;
        joinBtn.disabled = true;
        leaveBtn.disabled = false;
        updateStatus("মাইক্রোফোন অনুমতি চাচ্ছি...");
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            localStream = stream;
            isMicActive = true;
            micToggleBtn.disabled = false;
            micToggleBtn.innerText = '🔇 মাইক বন্ধ';
            // লোকাল ভলিউম ডিটেক্টর সেটআপ
            setupLocalVolumeDetection(stream);
            // অডিও আনলক (সাইলেন্ট প্লে)
            const silentAudio = new Audio();
            silentAudio.src = "data:audio/wav;base64,U3RlYWx0aCBpcyB0aGUgc291bmQgb2Ygc2lsZW5jZS4=";
            silentAudio.play().catch(e=>console.log);
            await database.ref(`voice_rooms/${currentRoomId}/users/${currentUserId}`).set(true);
            setupSignalingListeners();
            watchRoomUsers();
            updateStatus("রুমে জয়েন করেছেন! কথা বললে বৃত্ত ঘুরবে।");
            setTimeout(() => updateParticipantsList(), 500);
        } catch(err) {
            updateStatus("মাইক্রোফোন অনুমতি দেননি: "+err.message, true);
            joinBtn.disabled = false;
            leaveBtn.disabled = true;
            currentRoomId = null;
            currentUserId = null;
            if(localStream) localStream.getTracks().forEach(t=>t.stop());
            localStream = null;
        }
    }
    
    function toggleMic() {
        if (!localStream) return;
        const audioTrack = localStream.getAudioTracks()[0];
        if (audioTrack) {
            audioTrack.enabled = !audioTrack.enabled;
            isMicActive = audioTrack.enabled;
            micToggleBtn.innerText = isMicActive ? '🔇 মাইক বন্ধ' : '🎤 মাইক চালু';
            updateStatus(isMicActive ? "মাইক সক্রিয়" : "মাইক বন্ধ", false);
        }
    }
    
    // অথেনটিকেশন
    function showAuthStatus(msg, isErr) {
        authStatus.innerHTML = isErr ? `❌ ${msg}` : `✅ ${msg}`;
        authStatus.style.background = isErr ? '#fed7d7' : '#c6f6d5';
        setTimeout(() => { authStatus.innerHTML = ''; }, 3000);
    }
    loginBtn.onclick = async () => {
        const email = loginEmail.value.trim(), pwd = loginPassword.value.trim();
        if(!email || !pwd) return showAuthStatus("ইমেইল ও পাসওয়ার্ড দিন", true);
        try { await auth.signInWithEmailAndPassword(email, pwd); showAuthStatus("লগইন সফল!"); }
        catch(e) { showAuthStatus(e.message, true); }
    };
    signupBtn.onclick = async () => {
        const email = loginEmail.value.trim(), pwd = loginPassword.value.trim();
        if(!email || !pwd) return showAuthStatus("ইমেইল ও পাসওয়ার্ড দিন", true);
        try { await auth.createUserWithEmailAndPassword(email, pwd); showAuthStatus("অ্যাকাউন্ট তৈরি সফল!"); }
        catch(e) { showAuthStatus(e.message, true); }
    };
    logoutBtn.onclick = async () => { if(currentRoomId) await leaveCall(); await auth.signOut(); };
    auth.onAuthStateChanged(user => {
        if(user) { authSection.classList.add('hidden'); voiceSection.classList.remove('hidden'); if(currentRoomId) leaveCall(); }
        else { authSection.classList.remove('hidden'); voiceSection.classList.add('hidden'); if(localStream) localStream.getTracks().forEach(t=>t.stop()); peerConnections.forEach(pc=>pc.close()); peerConnections.clear(); localStream=null; }
    });
    
    joinBtn.onclick = joinCall;
    leaveBtn.onclick = leaveCall;
    micToggleBtn.onclick = toggleMic;
    
    window.addEventListener('beforeunload', () => {
        if(currentRoomId && currentUserId) database.ref(`voice_rooms/${currentRoomId}/users/${currentUserId}`).remove();
        if(localStream) localStream.getTracks().forEach(t=>t.stop());
        peerConnections.forEach(pc=>pc.close());
    });
</script>
</body>
</html>
