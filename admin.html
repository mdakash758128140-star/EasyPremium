<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Premium · অ্যাডমিন প্যানেল</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', Inter, sans-serif; }
        body { background: linear-gradient(145deg, #0a0a1a, #121230); min-height:100vh; color: #fff; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .glass-card { background: rgba(20,20,40,0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255,152,0,0.3); border-radius: 32px; max-width: 800px; width:100%; padding:30px; box-shadow: 0 25px 50px -8px #000; }
        .login-screen { text-align: center; }
        .login-box { max-width:400px; margin:0 auto; }
        .logo i { font-size:3rem; color:#ff9800; background:rgba(255,152,0,0.2); padding:20px; border-radius:50%; }
        h1 { color:#ff9800; margin:10px 0; }
        .google-login-btn { background:white; color:#333; border:none; padding:15px 30px; border-radius:50px; font-weight:600; cursor:pointer; width:100%; display:flex; align-items:center; justify-content:center; gap:10px; }
        .error-message { color:#ff6b6b; margin-top:10px; }
        .admin-panel { display:none; }
        .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; }
        .header h2 { color:#ff9800; }
        .logout-btn { background:#dc3545; color:white; border:none; padding:8px 20px; border-radius:40px; cursor:pointer; }
        .section-title { color:#ff9800; margin-bottom:20px; padding-bottom:10px; border-bottom:2px solid rgba(255,152,0,0.3); }
        .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:15px; margin-bottom:30px; }
        .stat-card { background:rgba(255,152,0,0.1); border:1px solid #ff9800; border-radius:16px; padding:15px; text-align:center; }
        .stat-value { font-size:2rem; font-weight:800; color:#ff9800; }
        .stat-label { font-size:0.9rem; color:#b0bec5; }
        .form-group { margin-bottom:20px; }
        label { display:block; color:#ffb74d; margin-bottom:5px; }
        input, select { width:100%; padding:12px 15px; background:rgba(0,0,0,0.3); border:1px solid rgba(255,152,0,0.5); border-radius:12px; color:white; }
        .btn { background:#ff9800; color:white; border:none; padding:12px 25px; border-radius:40px; font-weight:600; cursor:pointer; transition:0.2s; }
        .btn:hover { background:#ff5722; }
        .voucher-table { width:100%; background:rgba(0,0,0,0.2); border-radius:12px; overflow-x:auto; }
        .voucher-table th { background:rgba(255,152,0,0.2); padding:12px; color:#ff9800; }
        .voucher-table td { padding:12px; border-bottom:1px solid rgba(255,255,255,0.1); }
        .status-badge { padding:4px 12px; border-radius:30px; font-size:0.8rem; font-weight:600; }
        .status-active { background:rgba(76,175,80,0.2); color:#4caf50; }
        .toast { position:fixed; top:20px; right:20px; background:#ff9800; padding:15px 25px; border-radius:8px; animation:slideIn 0.3s; z-index:9999; }
        @keyframes slideIn { from{transform:translateX(100%); opacity:0;} to{transform:translateX(0); opacity:1;} }
        @media (max-width:600px){ .glass-card{ padding:15px; } }
    </style>
</head>
<body>
    <div class="glass-card">
        <div id="loginScreen" class="login-screen">
            <div class="login-box">
                <div class="logo"><i class="fas fa-crown"></i></div>
                <h1>Easy Premium</h1>
                <p style="color:#b0bec5; margin-bottom:30px;">শুধুমাত্র অনুমোদিত অ্যাডমিন</p>
                <button id="googleLoginBtn" class="google-login-btn">
                    <i class="fab fa-google"></i> Sign in with Google
                </button>
                <div id="loginError" class="error-message"></div>
            </div>
        </div>

        <div id="adminPanel" class="admin-panel">
            <div class="header">
                <h2><i class="fas fa-user-shield"></i> <span id="adminName"></span></h2>
                <button id="logoutBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i> লগ আউট</button>
            </div>

            <div class="stats-grid">
                <div class="stat-card"><div class="stat-value" id="totalVouchers">0</div><div class="stat-label">মোট ভাউচার</div></div>
                <div class="stat-card"><div class="stat-value" id="totalBalance">$0</div><div class="stat-label">মোট বিক্রয় (USD)</div></div>
            </div>

            <h3 class="section-title">➕ নতুন অর্ডার তৈরি করুন</h3>
            <form id="orderForm">
                <div class="form-group">
                    <label>প্রোডাক্ট স্লাগ</label>
                    <input type="text" id="productSlug" value="rewarble-ww-usd-5" placeholder="যেমন: rewarble-ww-usd-5" required>
                </div>
                <div class="form-group">
                    <label>পরিমাণ (কতটি)</label>
                    <input type="number" id="amount" min="1" value="1" required>
                </div>
                <div class="form-group">
                    <label>পেমেন্ট কারেন্সি</label>
                    <select id="paymentCurrency" required>
                        <option value="usd">USD</option>
                        <option value="bdt">BDT</option>
                        <option value="eur">EUR</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>রেফারেন্স (ঐচ্ছিক)</label>
                    <input type="text" id="reference" placeholder="আপনার রেফারেন্স">
                </div>
                <button type="submit" class="btn" id="orderBtn"><i class="fas fa-shopping-cart"></i> অর্ডার তৈরি করুন</button>
            </form>

            <div style="display:flex; gap:10px; margin:20px 0;">
                <button class="btn" id="showLocalVouchersBtn">স্থানীয় ভাউচার</button>
                <button class="btn" id="showRelogradeOrdersBtn">Relograde অর্ডার</button>
            </div>

            <div id="localVouchersSection">
                <h3 class="section-title">📋 ভাউচার তালিকা (অটো-আপডেট)</h3>
                <div style="overflow-x:auto;">
                    <table class="voucher-table">
                        <thead>
                            <tr><th>TRX</th><th>স্লাগ</th><th>পরিমাণ</th><th>স্ট্যাটাস</th><th>তারিখ</th></tr>
                        </thead>
                        <tbody id="voucherList">
                            <tr><td colspan="5" style="text-align:center;">লোড হচ্ছে...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div id="relogradeOrdersSection" style="display:none;">
                <h3 class="section-title">📦 Relograde অর্ডার তালিকা</h3>
                <div style="overflow-x:auto;">
                    <table class="voucher-table">
                        <thead>
                            <tr><th>TRX</th><th>স্ট্যাটাস</th><th>পরিমাণ</th><th>তারিখ</th></tr>
                        </thead>
                        <tbody id="relogradeOrdersList">
                            <tr><td colspan="4" style="text-align:center;">লোড হচ্ছে...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBt9t6mcjUtXxX2igAJdseuIIc8pP_QPEw",
            authDomain: "easy-premium.firebaseapp.com",
            databaseURL: "https://easy-premium-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "easy-premium",
            storageBucket: "easy-premium.firebasestorage.app",
            messagingSenderId: "155891252265",
            appId: "1:155891252265:web:77ab41de24231e8e5ef038"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        const ALLOWED_EMAILS = ['mdashikislam017705@gmail.com', 'mdsojib1388888@gmail.com', 'admin@easy-premium.com'];

        const loginScreen = document.getElementById('loginScreen');
        const adminPanel = document.getElementById('adminPanel');
        const googleLoginBtn = document.getElementById('googleLoginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const adminNameSpan = document.getElementById('adminName');
        const totalVouchers = document.getElementById('totalVouchers');
        const totalBalance = document.getElementById('totalBalance');
        const orderForm = document.getElementById('orderForm');
        const orderBtn = document.getElementById('orderBtn');
        const voucherList = document.getElementById('voucherList');
        const relogradeOrdersList = document.getElementById('relogradeOrdersList');
        const showLocalBtn = document.getElementById('showLocalVouchersBtn');
        const showRelogradeBtn = document.getElementById('showRelogradeOrdersBtn');
        const localSection = document.getElementById('localVouchersSection');
        const relogradeSection = document.getElementById('relogradeOrdersSection');

        auth.onAuthStateChanged(user => {
            if (user && ALLOWED_EMAILS.includes(user.email)) {
                adminNameSpan.textContent = user.displayName || user.email;
                loginScreen.style.display = 'none';
                adminPanel.style.display = 'block';
                loadLocalVouchers();
            } else {
                if (user) auth.signOut();
                loginScreen.style.display = 'block';
                adminPanel.style.display = 'none';
            }
        });

        googleLoginBtn.addEventListener('click', async () => {
            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                const result = await auth.signInWithPopup(provider);
                if (!ALLOWED_EMAILS.includes(result.user.email)) {
                    await auth.signOut();
                    showToast('অননুমোদিত ইমেইল', 'error');
                }
            } catch (e) {
                showToast('লগইন ব্যর্থ: ' + e.message, 'error');
            }
        });

        logoutBtn.addEventListener('click', () => auth.signOut());

        showLocalBtn.addEventListener('click', () => {
            localSection.style.display = 'block';
            relogradeSection.style.display = 'none';
            loadLocalVouchers();
        });

        showRelogradeBtn.addEventListener('click', () => {
            localSection.style.display = 'none';
            relogradeSection.style.display = 'block';
            loadRelogradeOrders();
        });

        orderForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const productSlug = document.getElementById('productSlug').value.trim();
            const amount = parseInt(document.getElementById('amount').value);
            const paymentCurrency = document.getElementById('paymentCurrency').value;
            const reference = document.getElementById('reference').value.trim();

            if (!productSlug || amount < 1) {
                showToast('সঠিক তথ্য দিন', 'error');
                return;
            }

            orderBtn.disabled = true;
            orderBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> প্রক্রিয়াকরণ...';

            try {
                const response = await fetch('/api/create-order', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ productSlug, amount, paymentCurrency, reference })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error || 'অর্ডার তৈরি ব্যর্থ');
                }

                const data = await response.json();
                showToast('✅ অর্ডার সফল হয়েছে! ওয়েবহুকের মাধ্যমে ভাউচার যুক্ত হবে।', 'success');
                orderForm.reset();
                document.getElementById('productSlug').value = 'rewarble-ww-usd-5';
                document.getElementById('amount').value = '1';
            } catch (error) {
                console.error('❌ অর্ডার ত্রুটি:', error);
                showToast('ত্রুটি: ' + error.message, 'error');
            } finally {
                orderBtn.disabled = false;
                orderBtn.innerHTML = '<i class="fas fa-shopping-cart"></i> অর্ডার তৈরি করুন';
            }
        });

        async function loadLocalVouchers() {
            try {
                const snap = await database.ref('vouchers').once('value');
                const data = snap.val();
                let html = '';
                let totalAmt = 0, count = 0;
                if (data) {
                    const sorted = Object.entries(data).sort((a,b) => b[1].createdAt - a[1].createdAt);
                    sorted.forEach(([key, val]) => {
                        count++;
                        if (val.currency === 'usd') totalAmt += parseFloat(val.amount) || 0;
                        html += `<tr>
                            <td>${val.trx ? val.trx.substring(0,10) : 'N/A'}</td>
                            <td>${val.productSlug || ''}</td>
                            <td>${val.amount} ${val.currency}</td>
                            <td><span class="status-badge status-active">${val.status || 'active'}</span></td>
                            <td>${val.createdAt ? new Date(val.createdAt).toLocaleDateString('bn-BD') : ''}</td>
                        </tr>`;
                    });
                }
                voucherList.innerHTML = html || '<tr><td colspan="5" style="text-align:center;">কোন ভাউচার নেই</td></tr>';
                totalVouchers.textContent = count;
                totalBalance.textContent = `$${totalAmt.toFixed(2)}`;
            } catch (e) {
                voucherList.innerHTML = '<tr><td colspan="5" style="text-align:center;">ডেটা লোডে ত্রুটি</td></tr>';
            }
        }

        async function loadRelogradeOrders() {
            relogradeOrdersList.innerHTML = '<tr><td colspan="4" style="text-align:center;">লোড হচ্ছে...</td></tr>';
            try {
                const response = await fetch('/api/relograde-orders');
                if (!response.ok) throw new Error('Failed to fetch');
                const result = await response.json();
                const orders = result.data || [];
                if (orders.length === 0) {
                    relogradeOrdersList.innerHTML = '<tr><td colspan="4" style="text-align:center;">কোন অর্ডার নেই</td></tr>';
                    return;
                }
                let html = '';
                orders.forEach(order => {
                    const status = order.orderStatus || 'unknown';
                    const amount = order.items?.[0]?.amount || order.totalAmount || 0;
                    const currency = order.paymentCurrency || '';
                    const date = order.createdAt || order.dateCreated || '';
                    html += `<tr>
                        <td>${order.trx?.substring(0,12) || 'N/A'}</td>
                        <td><span class="status-badge">${status}</span></td>
                        <td>${amount} ${currency}</td>
                        <td>${date ? new Date(date).toLocaleDateString('bn-BD') : 'N/A'}</td>
                    </tr>`;
                });
                relogradeOrdersList.innerHTML = html;
            } catch (error) {
                relogradeOrdersList.innerHTML = `<tr><td colspan="4" style="text-align:center;color:#ff6b6b;">ত্রুটি: ${error.message}</td></tr>`;
            }
        }

        function showToast(msg, type = 'info') {
            const t = document.createElement('div');
            t.className = 'toast';
            t.style.background = type === 'error' ? '#dc3545' : '#28a745';
            t.innerText = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }
    </script>
</body>
</html>
