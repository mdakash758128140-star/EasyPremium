<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ভাউচার লুকআপ - Easy Premium</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0a0a1a, #121230);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(20, 20, 40, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 152, 0, 0.3);
        }
        h1 {
            color: #ff9800;
            font-size: 1.8rem;
            margin-bottom: 10px;
            text-align: center;
        }
        .sub {
            text-align: center;
            color: #b0bec5;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }
        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #ff9800;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
            outline: none;
        }
        input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        button {
            background: linear-gradient(45deg, #ff9800, #ff5722);
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(255, 152, 0, 0.4);
        }
        .result {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            border-left: 4px solid #ff9800;
        }
        .result h3 {
            color: #ff9800;
            margin-bottom: 15px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255, 152, 0, 0.2);
        }
        .info-label {
            color: #b0bec5;
            font-weight: 500;
        }
        .info-value {
            color: white;
            font-weight: 600;
            word-break: break-all;
            text-align: right;
        }
        .error {
            color: #ff6b6b;
            text-align: center;
            padding: 15px;
            background: rgba(255, 107, 107, 0.1);
            border-radius: 8px;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #ff9800;
        }
        .footer {
            margin-top: 20px;
            font-size: 0.75rem;
            text-align: center;
            color: #888;
        }
        @media (max-width: 500px) {
            .container {
                padding: 20px;
            }
            .info-row {
                flex-direction: column;
                gap: 5px;
            }
            .info-value {
                text-align: left;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 ভাউচার লুকআপ</h1>
        <div class="sub">আপনার রিডিম টোকেন লিখুন</div>
        <div class="input-group">
            <input type="text" id="tokenInput" placeholder="যেমন: 6060482eoLmjczuz0uhrkxGX67sKyo1WKp9G6">
            <button id="searchBtn">সার্চ করুন</button>
        </div>
        <div id="resultArea" class="result" style="display: none;"></div>
        <div class="footer">
            ⚡ আপনার টোকেন দিয়ে ভাউচার তথ্য সংগ্রহ করা হচ্ছে<br>
            💳 শুধুমাত্র স্যান্ডবক্স/লাইভ অর্ডারের জন্য কাজ করবে
        </div>
    </div>

    <script>
        const tokenInput = document.getElementById('tokenInput');
        const searchBtn = document.getElementById('searchBtn');
        const resultArea = document.getElementById('resultArea');

        async function lookupVoucher() {
            const token = tokenInput.value.trim();
            if (!token) {
                showError('দয়া করে একটি টোকেন দিন');
                return;
            }

            resultArea.style.display = 'block';
            resultArea.innerHTML = '<div class="loading"><div class="spinner"></div> অনুগ্রহ করে অপেক্ষা করুন...</div>';
            
            // CSS spinner যোগ করা হচ্ছে
            if (!document.querySelector('#spinnerStyle')) {
                const style = document.createElement('style');
                style.id = 'spinnerStyle';
                style.textContent = `
                    .spinner {
                        width: 40px;
                        height: 40px;
                        border: 4px solid rgba(255,152,0,0.3);
                        border-top: 4px solid #ff9800;
                        border-radius: 50%;
                        animation: spin 1s linear infinite;
                        margin: 0 auto 10px;
                    }
                    @keyframes spin {
                        0% { transform: rotate(0deg); }
                        100% { transform: rotate(360deg); }
                    }
                `;
                document.head.appendChild(style);
            }

            try {
                const response = await fetch(`/api/get-voucher?token=${encodeURIComponent(token)}`);
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || `HTTP ${response.status}`);
                }

                if (!data.success) {
                    throw new Error('ভাউচার তথ্য পাওয়া যায়নি');
                }

                // ডেটা দেখান
                let html = '<h3>✅ ভাউচার তথ্য</h3>';
                if (data.productName) {
                    html += `<div class="info-row"><span class="info-label">প্রোডাক্ট</span><span class="info-value">${escapeHtml(data.productName)}</span></div>`;
                }
                if (data.amount) {
                    html += `<div class="info-row"><span class="info-label">মূল্য</span><span class="info-value">${escapeHtml(data.amount)}</span></div>`;
                }
                if (data.voucherCode) {
                    html += `<div class="info-row"><span class="info-label">ভাউচার কোড</span><span class="info-value"><strong style="color:#ff9800">${escapeHtml(data.voucherCode)}</strong></span></div>`;
                } else {
                    html += `<div class="info-row"><span class="info-label">ভাউচার কোড</span><span class="info-value">পাওয়া যায়নি</span></div>`;
                }
                if (data.serialCode) {
                    html += `<div class="info-row"><span class="info-label">সিরিয়াল কোড</span><span class="info-value">${escapeHtml(data.serialCode)}</span></div>`;
                } else {
                    html += `<div class="info-row"><span class="info-label">সিরিয়াল কোড</span><span class="info-value">পাওয়া যায়নি</span></div>`;
                }
                html += `<div class="info-row"><span class="info-label">টোকেন</span><span class="info-value">${escapeHtml(data.token)}</span></div>`;
                resultArea.innerHTML = html;

                // কপি বাটন যোগ করা (ঐচ্ছিক)
                if (data.voucherCode) {
                    const copyBtn = document.createElement('button');
                    copyBtn.textContent = '📋 কপি করুন';
                    copyBtn.style.marginTop = '15px';
                    copyBtn.style.padding = '8px 16px';
                    copyBtn.style.background = '#ff9800';
                    copyBtn.style.border = 'none';
                    copyBtn.style.borderRadius = '6px';
                    copyBtn.style.cursor = 'pointer';
                    copyBtn.onclick = () => {
                        navigator.clipboard.writeText(data.voucherCode);
                        alert('ভাউচার কোড কপি করা হয়েছে!');
                    };
                    resultArea.appendChild(copyBtn);
                }
            } catch (err) {
                showError(err.message);
            }
        }

        function showError(msg) {
            resultArea.innerHTML = `<div class="error">❌ ${escapeHtml(msg)}</div>`;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        searchBtn.addEventListener('click', lookupVoucher);
        tokenInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') lookupVoucher();
        });
    </script>
</body>
</html>
