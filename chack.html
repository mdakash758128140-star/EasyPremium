<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase টেস্ট · Easy Premium</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Noto Sans Bengali', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #121230 50%, #1a1a3a 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: #ff9800;
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #00bcd4;
            font-size: 16px;
        }
        
        .card {
            background: rgba(20, 20, 40, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 152, 0, 0.3);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 152, 0, 0.2);
        }
        
        .label {
            color: #b0bec5;
            font-weight: 600;
        }
        
        .value {
            color: #ffb74d;
            font-weight: 700;
            text-align: right;
        }
        
        .success { color: #4caf50; }
        .error { color: #ff6b6b; }
        .warning { color: #ff9800; }
        
        .step-item {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid;
        }
        
        .step-success { border-left-color: #4caf50; }
        .step-failed { border-left-color: #ff6b6b; }
        
        .step-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 18px;
            font-weight: 600;
        }
        
        .step-details {
            font-size: 14px;
            color: #b0bec5;
            white-space: pre-wrap;
            word-break: break-word;
        }
        
        .button {
            background: linear-gradient(45deg, #ff9800, #ff2222);
            color: white;
            border: none;
            padding: 14px 30px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            max-width: 300px;
            margin: 20px auto;
            display: block;
        }
        
        .button:hover {
            background: linear-gradient(45deg, #ff2222, #0008ff);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 152, 0, 0.4);
        }
        
        .button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .env-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        
        .env-item {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }
        
        .env-status {
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .env-name {
            color: #b0bec5;
            font-size: 12px;
            text-transform: uppercase;
        }
        
        .timestamp {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-top: 20px;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #ff9800;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        pre {
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            color: #00bcd4;
            font-size: 12px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>EASY PREMIUM</h1>
            <p>Firebase কানেকশন টেস্ট</p>
        </div>
        
        <div class="card">
            <div style="text-align: center; margin-bottom: 20px;">
                <h2 style="color: #ff9800;">🔍 Firebase টেস্ট টুল</h2>
                <p style="color: #b0bec5;">নিচের বাটনে ক্লিক করে আপনার Firebase কানেকশন চেক করুন</p>
            </div>
            
            <button id="testBtn" class="button" onclick="runTest()">টেস্ট শুরু করুন</button>
            
            <div id="loading" style="display: none; text-align: center; margin: 20px 0;">
                <span class="loading"></span> টেস্ট চলছে...
            </div>
        </div>
        
        <div id="result" style="display: none;">
            <div class="card">
                <h3 style="color: #ff9800; margin-bottom: 15px;">📊 টেস্ট রেজাল্ট</h3>
                
                <div id="envSummary" class="env-grid"></div>
                
                <div id="steps"></div>
                
                <div id="finalStatus" style="margin-top: 20px; padding: 15px; border-radius: 8px; text-align: center; font-weight: bold;"></div>
                
                <div id="timestamp" class="timestamp"></div>
            </div>
            
            <div class="card">
                <h3 style="color: #ff9800; margin-bottom: 15px;">📋 সম্পূর্ণ রেসপন্স</h3>
                <pre id="rawResponse"></pre>
            </div>
        </div>
    </div>

    <script>
        async function runTest() {
            const testBtn = document.getElementById('testBtn');
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');
            
            testBtn.disabled = true;
            loading.style.display = 'block';
            result.style.display = 'none';
            
            try {
                const response = await fetch('/api/test-firebase');
                const data = await response.json();
                
                displayResult(data);
            } catch (error) {
                alert('টেস্ট failed: ' + error.message);
            } finally {
                testBtn.disabled = false;
                loading.style.display = 'none';
            }
        }
        
        function displayResult(data) {
            const result = document.getElementById('result');
            const envSummary = document.getElementById('envSummary');
            const steps = document.getElementById('steps');
            const finalStatus = document.getElementById('finalStatus');
            const timestamp = document.getElementById('timestamp');
            const rawResponse = document.getElementById('rawResponse');
            
            result.style.display = 'block';
            
            // Environment Summary
            if (data.steps && data.steps[0] && data.steps[0].data) {
                const env = data.steps[0].data;
                envSummary.innerHTML = Object.entries(env).map(([key, value]) => `
                    <div class="env-item">
                        <div class="env-status ${value.includes('✅') ? 'success' : 'error'}">${value.includes('✅') ? '✅' : '❌'}</div>
                        <div class="env-name">${key}</div>
                    </div>
                `).join('');
            }
            
            // Steps
            if (data.steps) {
                steps.innerHTML = data.steps.slice(1).map(step => `
                    <div class="step-item ${step.status?.includes('✅') ? 'step-success' : 'step-failed'}">
                        <div class="step-header">
                            <span>${step.name}</span>
                            <span class="${step.status?.includes('✅') ? 'success' : 'error'}">${step.status || '⚠️ Unknown'}</span>
                        </div>
                        <div class="step-details">
                            ${step.error ? `<span class="error">Error: ${step.error}</span>` : ''}
                            ${step.key ? `<div>Key: ${step.key}</div>` : ''}
                            ${step.path ? `<div>Path: ${step.path}</div>` : ''}
                            ${step.data ? `<pre>${JSON.stringify(step.data, null, 2)}</pre>` : ''}
                        </div>
                    </div>
                `).join('');
            }
            
            // Final Status
            finalStatus.innerHTML = data.finalStatus || '⚠️ No final status';
            finalStatus.className = data.finalStatus?.includes('✅') ? 'success' : 'error';
            finalStatus.style.padding = '15px';
            finalStatus.style.borderRadius = '8px';
            finalStatus.style.background = 'rgba(0,0,0,0.3)';
            
            // Timestamp
            timestamp.innerHTML = `টেস্ট সময়: ${new Date(data.timestamp).toLocaleString('bn-BD')}`;
            
            // Raw Response
            rawResponse.innerHTML = JSON.stringify(data, null, 2);
        }
    </script>
</body>
</html>
