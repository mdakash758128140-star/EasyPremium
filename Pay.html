<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>পেমেন্ট · Easy Premium</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a1a, #121230);
            font-family: 'Segoe UI', 'Noto Sans Bengali', sans-serif;
            padding: 20px;
            padding-bottom: 85px;
            color: #fff;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .card {
            background: rgba(20,20,40,0.95);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,152,0,0.3);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: #ff9800; font-size: 28px; }
        .header p { color: #00bcd4; font-size: 14px; }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,152,0,0.2);
        }
        .label { color: #b0bec5; font-weight: 500; }
        .value { color: #ffb74d; font-weight: bold; text-align: right; }
        .total { color: #ff9800; font-size: 20px; }
        .pay-btn {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(45deg, #ff9800, #ff2222);
            border: none;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            z-index: 1000;
        }
        .pay-btn.hidden { display: none; }
        .payment-panel { display: none; margin-top: 20px; }
        .method {
            background: rgba(30,30,60,0.9);
            border-radius: 20px;
            margin-bottom: 12px;
            padding: 12px 16px;
            cursor: pointer;
        }
        .method.selected { border: 1px solid #ff9800; background: rgba(255,152,0,0.1); }
        .method-radio { margin-right: 12px; transform: scale(1.1); accent-color: #ff9800; }
        .method-label { font-size: 18px; font-weight: 500; display: inline-flex; align-items: center; gap: 8px; }
        .method-label img { width: 28px; height: 28px; border-radius: 6px; }
        .payment-details { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #ff9800; }
        .payment-details.show { display: block; }
        .account-row {
            background: #1a1a2e;
            padding: 12px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            margin: 12px 0;
        }
        .admin-number {
            font-family: monospace;
            background: #2a2a4a;
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 16px;
        }
        .copy-btn {
            background: #4caf50;
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            margin: 8px 0;
            background: #2a2a4a;
            border: 1px solid #ff9800;
            border-radius: 40px;
            color: white;
            font-size: 14px;
        }
        .verify-btn {
            background: linear-gradient(45deg, #ff9800, #ff2222);
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 40px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            margin-top: 15px;
            cursor: pointer;
        }
        .status {
            background: #1e1e3a;
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 20px;
            font-family: monospace;
            font-size: 13px;
            word-break: break-all;
            color: #0f0;
        }
        .error { color: #ff6666; }
        .hidden { display: none; }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #ff9800;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        firebase.initializeApp({
            apiKey: "AIzaSyBt9t6mcjUtXxX2igAJdseuIIc8pP_QPEw",
            authDomain: "easy-premium.firebaseapp.com",
            databaseURL: "https://easy-premium-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "easy-premium",
            storageBucket: "easy-premium.firebasestorage.app",
            messagingSenderId: "155891252265",
            appId: "1:155891252265:web:77ab41de24231e8e5ef038"
        });
        const db = firebase.database();
        const MAIN_SITE = "https://easy-premium.com";

        // Decode base64 (URL-safe)
        function decodeBase64(str) {
            try {
                let base64 = decodeURIComponent(str);
                return atob(base64);
            } catch(e) {
                console.error("Base64 decode error", e);
                return null;
            }
        }

        // Parse data parameter
        function parseOrderData(encrypted) {
            const decoded = decodeBase64(encrypted);
            if (!decoded) return null;
            const parts = decoded.split('|');
            if (parts.length < 6) return null;
            return {
                orderId: parts[0],
                platformId: parts[1].replace(/[^a-zA-Z0-9_-]/g, ''),
                price: parts[2],
                timestamp: parseInt(parts[3], 10),
                userId: parts[4],
                userEmail: parts[5]
            };
        }

        // Check if order is older than 24 hours (based on URL timestamp)
        function isOrderExpired(timestamp) {
            if (!timestamp) return false;
            const now = Date.now();
            const diffHours = (now - timestamp) / (1000 * 60 * 60);
            return diffHours > 24;
        }

        // Get product details (name, service charge) - this is public data, no auth needed
        async function getProductDetails(platformId) {
            try {
                let snap = await db.ref('publicData/pricingPlans1').once('value');
                let plans = snap.val();
                if (plans) {
                    for (let k in plans) {
                        if (k === platformId || plans[k]?.Products === platformId) return plans[k];
                    }
                }
                snap = await db.ref('publicData/pricingPlans2').once('value');
                plans = snap.val();
                if (plans) {
                    for (let k in plans) {
                        if (k === platformId || plans[k]?.Products === platformId) return plans[k];
                    }
                }
                return null;
            } catch(e) {
                return null;
            }
        }

        // Get active admin number (public data)
        async function getActiveAdminNumber() {
            try {
                const snap = await db.ref('publicAdminInfo').once('value');
                const admins = snap.val() || {};
                const now = Date.now();
                const oneMinuteAgo = now - 60 * 1000;
                let latest = 0, activeNum = null;
                for (let uid in admins) {
                    const a = admins[uid];
                    if (a.lastActive) {
                        const t = new Date(a.lastActive).getTime();
                        if (t >= oneMinuteAgo && t > latest) {
                            latest = t;
                            activeNum = a.number;
                        }
                    }
                }
                if (activeNum) {
                    let num = activeNum.toString();
                    if (num.length === 10 && !num.startsWith('0')) num = '0' + num;
                    return num;
                }
                return null;
            } catch(e) {
                return null;
            }
        }

        window.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const encData = urlParams.get('data');
            const statusDiv = document.getElementById('status');
            const loadingCard = document.getElementById('loadingCard');
            const orderCard = document.getElementById('orderCard');
            const paymentPanel = document.getElementById('paymentPanel');
            const payBtn = document.getElementById('payBtn');

            if (!encData) {
                statusDiv.innerHTML = '❌ URL-এ data প্যারামিটার নেই';
                statusDiv.classList.add('error');
                setTimeout(() => location.href = MAIN_SITE, 3000);
                return;
            }

            statusDiv.innerHTML = '🔍 ডাটা ডিকোড করা হচ্ছে...';
            const orderInfo = parseOrderData(encData);
            if (!orderInfo) {
                statusDiv.innerHTML = '❌ ডাটা ডিকোড করতে ব্যর্থ';
                statusDiv.classList.add('error');
                setTimeout(() => location.href = MAIN_SITE, 3000);
                return;
            }

            // Check expiration from URL timestamp
            if (isOrderExpired(orderInfo.timestamp)) {
                statusDiv.innerHTML = '❌ এই অর্ডারটি ২৪ ঘণ্টার বেশি পুরনো। পুনরায় অর্ডার করুন।';
                statusDiv.classList.add('error');
                setTimeout(() => location.href = MAIN_SITE, 3000);
                return;
            }

            statusDiv.innerHTML = `✅ অর্ডার বৈধ (২৪ ঘণ্টার মধ্যে)`;

            // Fetch product details (public, no auth)
            const product = await getProductDetails(orderInfo.platformId);
            const productPrice = Number(orderInfo.price);
            const serviceCharge = product?.ServicCharge ? Number(product.ServicCharge) : 0;
            const total = productPrice + serviceCharge;
            const productName = product?.name || orderInfo.platformId.replace(/_/g, ' ');

            // Show order card
            loadingCard.style.display = 'none';
            orderCard.style.display = 'block';
            document.getElementById('orderId').innerText = orderInfo.orderId;
            document.getElementById('productName').innerText = productName;
            document.getElementById('price').innerText = productPrice;
            document.getElementById('serviceCharge').innerText = serviceCharge;
            document.getElementById('totalAmount').innerText = total;

            // Get admin number
            const adminNum = await getActiveAdminNumber();
            if (adminNum) {
                document.querySelectorAll('.admin-number').forEach(el => el.innerText = adminNum);
                document.querySelectorAll('.copy-btn').forEach(btn => btn.setAttribute('data-number', adminNum));
                payBtn.classList.remove('hidden');
                statusDiv.innerHTML += `<br>✅ প্রশাসক অনলাইন (${adminNum})। পেমেন্ট বাটন সক্রিয়।`;
            } else {
                statusDiv.innerHTML += `<br>⚠️ কোনো প্রশাসক এখন অনলাইনে নেই। পেমেন্ট বাটন অক্ষম।`;
                payBtn.classList.add('hidden');
            }

            // Payment button click
            payBtn.onclick = () => {
                orderCard.style.display = 'none';
                paymentPanel.style.display = 'block';
                document.querySelectorAll('.total-display').forEach(el => el.innerText = total);
                statusDiv.style.display = 'none';
            };

            // Payment method selection
            const methods = document.querySelectorAll('.method');
            const details = {
                bkash: document.getElementById('bkash-details'),
                nagad: document.getElementById('nagad-details'),
                rocket: document.getElementById('rocket-details')
            };
            function showMethod(methodId) {
                Object.values(details).forEach(d => d.classList.remove('show'));
                details[methodId].classList.add('show');
                methods.forEach(m => m.classList.remove('selected'));
                document.getElementById(`method-${methodId}`).classList.add('selected');
                document.getElementById(`radio-${methodId}`).checked = true;
            }
            document.getElementById('method-bkash').onclick = () => showMethod('bkash');
            document.getElementById('method-nagad').onclick = () => showMethod('nagad');
            document.getElementById('method-rocket').onclick = () => showMethod('rocket');

            // Copy buttons
            document.querySelectorAll('.copy-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const num = this.getAttribute('data-number');
                    if (num) {
                        navigator.clipboard?.writeText(num);
                        const original = this.innerText;
                        this.innerText = 'Copied!';
                        setTimeout(() => this.innerText = original, 1500);
                    }
                });
            });

            // Verify button (submit to server)
            const verifyBtn = document.getElementById('verifyBtn');
            verifyBtn.onclick = async function() {
                const selected = document.querySelector('input[name="payment_method"]:checked');
                if (!selected) { alert('পেমেন্ট পদ্ধতি নির্বাচন করুন'); return; }
                let accInput, txInput;
                if (selected.value === 'bkash') {
                    accInput = document.getElementById('bkash-account');
                    txInput = document.getElementById('bkash-txid');
                } else if (selected.value === 'nagad') {
                    accInput = document.getElementById('nagad-account');
                    txInput = document.getElementById('nagad-txid');
                } else {
                    accInput = document.getElementById('rocket-account');
                    txInput = document.getElementById('rocket-txid');
                }
                const account = accInput.value.trim();
                const txid = txInput.value.trim();
                const adminNumber = document.querySelector('.admin-number')?.innerText || '';
                if (!account || !txid) {
                    alert('অ্যাকাউন্ট নম্বর এবং ট্রানজেকশন আইডি দিন');
                    return;
                }
                this.disabled = true;
                this.innerHTML = '<span class="spinner"></span> প্রসেসিং...';
                const reference = JSON.stringify({
                    method: selected.value.toUpperCase(),
                    phone: account,
                    txid,
                    userId: orderInfo.userId,
                    email: orderInfo.userEmail,
                    admin: adminNumber,
                    firebaseOrderId: orderInfo.orderId,
                    timestamp: new Date().toISOString()
                });
                try {
                    const res = await fetch('/api/create-order', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            productSlug: product?.Products || orderInfo.platformId,
                            amount: productPrice,
                            paymentCurrency: 'USD',
                            reference,
                            firebaseOrderId: orderInfo.orderId,
                            serviceCharge
                        })
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || 'অর্ডার ব্যর্থ');
                    if (data.link) location.href = data.link;
                    else {
                        paymentPanel.innerHTML = '<div class="card" style="text-align:center"><h3 style="color:#ff9800">✅ অর্ডার জমা হয়েছে</h3><p>আপনার ইমেইলে নিশ্চিতকরণ পাঠানো হয়েছে</p></div>';
                    }
                } catch(err) {
                    alert('ত্রুটি: ' + err.message);
                    this.disabled = false;
                    this.innerHTML = 'VERIFY';
                }
            };
        });
    </script>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>EASY PREMIUM</h1>
        <p>পেমেন্ট পৃষ্ঠা</p>
    </div>

    <div id="status" class="status">🚀 শুরু হচ্ছে...</div>

    <div id="loadingCard" class="card" style="text-align:center">
        <div class="spinner"></div> তথ্য যাচাই করা হচ্ছে...
    </div>

    <div id="orderCard" class="card" style="display:none">
        <h3 style="color:#ff9800; margin-bottom:15px">📋 অর্ডার তথ্য</h3>
        <div class="info-row"><span class="label">অর্ডার আইডি</span><span class="value" id="orderId">-</span></div>
        <div class="info-row"><span class="label">প্ল্যাটফর্ম</span><span class="value" id="productName">-</span></div>
        <div class="info-row"><span class="label">মূল্য</span><span class="value" id="price">0</span><span> ৳</span></div>
        <div class="info-row"><span class="label">সার্ভিস চার্জ</span><span class="value" id="serviceCharge">0</span><span> ৳</span></div>
        <div class="info-row"><span class="label"><strong>সর্বমোট</strong></span><span class="value total" id="totalAmount">0</span><span> ৳</span></div>
    </div>

    <div id="paymentPanel" class="payment-panel">
        <div class="card">
            <div style="text-align:center; font-size:20px; margin-bottom:15px">আপনাকে মোট <b class="total-display">0</b> ৳ পাঠাতে হবে</div>

            <!-- bKash -->
            <div id="method-bkash" class="method selected">
                <input type="radio" name="payment_method" value="bkash" id="radio-bkash" checked style="display:none">
                <span class="method-radio">🔘</span>
                <span class="method-label">bKash Personal <img src="https://www.bdgameghor.net/wp-content/plugins/bangladeshi-payment-gateways/assets/images/Bkash.png"></span>
                <div id="bkash-details" class="payment-details show">
                    <div class="account-row">
                        <span><strong>bKash:</strong> <span class="admin-number">01785926770</span></span>
                        <button type="button" class="copy-btn" data-number="01785926770">Copy</button>
                    </div>
                    <input type="text" id="bkash-account" placeholder="আপনার bKash নম্বর">
                    <input type="text" id="bkash-txid" placeholder="Transaction ID">
                </div>
            </div>

            <!-- Nagad -->
            <div id="method-nagad" class="method">
                <input type="radio" name="payment_method" value="nagad" id="radio-nagad" style="display:none">
                <span class="method-radio">🔘</span>
                <span class="method-label">Nagad Personal <img src="https://www.bdgameghor.net/wp-content/plugins/bangladeshi-payment-gateways/assets/images/Nagad.png"></span>
                <div id="nagad-details" class="payment-details">
                    <div class="account-row">
                        <span><strong>Nagad:</strong> <span class="admin-number">01338156280</span></span>
                        <button type="button" class="copy-btn" data-number="01338156280">Copy</button>
                    </div>
                    <input type="text" id="nagad-account" placeholder="আপনার Nagad নম্বর">
                    <input type="text" id="nagad-txid" placeholder="Transaction ID">
                </div>
            </div>

            <!-- Rocket -->
            <div id="method-rocket" class="method">
                <input type="radio" name="payment_method" value="rocket" id="radio-rocket" style="display:none">
                <span class="method-radio">🔘</span>
                <span class="method-label">Rocket Personal <img src="https://www.bdgameghor.net/wp-content/plugins/bangladeshi-payment-gateways/assets/images/Rocket.png"></span>
                <div id="rocket-details" class="payment-details">
                    <div class="account-row">
                        <span><strong>Rocket:</strong> <span class="admin-number">014013018874</span></span>
                        <button type="button" class="copy-btn" data-number="014013018874">Copy</button>
                    </div>
                    <input type="text" id="rocket-account" placeholder="আপনার Rocket নম্বর">
                    <input type="text" id="rocket-txid" placeholder="Transaction ID">
                </div>
            </div>

            <button id="verifyBtn" class="verify-btn">VERIFY</button>
        </div>
    </div>

    <button id="payBtn" class="pay-btn hidden">পেমেন্ট কনফার্ম করুন</button>
</div>
</body>
</html>
