<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Premium - ভয়েস কল (ফিক্সড v2)</title>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #0f172a, #1e1b4b); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 48px; max-width: 950px; width: 100%; padding: 25px; border: 1px solid rgba(255,255,255,0.2); }
        h2 { text-align: center; color: #f0f0ff; margin-bottom: 15px; }
        input, button { width: 100%; padding: 12px 15px; border-radius: 60px; border: none; font-size: 1rem; margin-top: 8px; }
        button { background: #8b5cf6; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { opacity: 0.9; transform: scale(1.02); }
        .btn-danger { background: #ef4444; }
        .btn-success { background: #10b981; }
        .card { background: rgba(0,0,0,0.3); border-radius: 32px; padding: 18px; margin-bottom: 20px; }
        .status { background: rgba(0,0,0,0.6); border-radius: 60px; padding: 10px; text-align: center; color: #e2e8f0; margin: 10px 0; font-size: 0.9rem; }
        .participants-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 25px; margin-top: 20px; }
        .participant-circle { text-align: center; width: 100px; cursor: pointer; }
        .circle { width: 80px; height: 80px; border-radius: 50%; background: #2d2b55; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; border: 3px solid #4f46e5; transition: all 0.1s; }
        .circle.speaking { animation: pulseRotate 0.5s infinite alternate; border-color: #facc15; }
        @keyframes pulseRotate { 0% { transform: scale(1) rotate(0deg); } 100% { transform: scale(1.08) rotate(5deg); } }
        .participant-name { color: white; background: rgba(0,0,0,0.6); border-radius: 40px; padding: 4px; font-size: 0.8rem; }
        .flex-btns { display: flex; gap: 12px; }
        .hidden { display: none; }
        .mic-btn { background: #f59e0b; width: auto; padding: 5px 15px; }
        .debug-log { font-family: monospace; font-size: 0.7rem; background: rgba(0,0,0,0.5); border-radius: 16px; padding: 8px; margin-top: 15px; max-height: 150px; overflow-y: auto; color: #ccc; }
        .test-btn { background: #3b82f6; width: auto; padding: 5px 10px; font-size: 0.8rem; margin-top: 5px; }
        .audio-test { background: #f59e0b; width: auto; padding: 5px 10px; font-size: 0.8rem; margin-left: 5px; }
        .connection-badge { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 5px; }
        .badge-connected { background: #10b981; box-shadow: 0 0 5px #10b981; }
        .badge-disconnected { background: #ef4444; }
    </style>
</head>
<body>
<div class="container" id="app">
    <div id="authSection">
        <h2>🔐 লগইন / রেজিস্টার</h2>
        <div class="card">
            <input type="email" id="loginEmail" placeholder="ইমেইল">
            <input type="password" id="loginPassword" placeholder="পাসওয়ার্ড">
            <button id="loginBtn">লগইন</button>
            <button id="signupBtn" class="btn-success">রেজিস্টার</button>
        </div>
        <div id="authStatus" class="status"></div>
    </div>
    <div id="voiceSection" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>🎙️ গ্রুপ ভয়েস কল</h2>
            <button id="logoutBtn" class="btn-danger" style="width: auto; padding: 8px 16px;">লগআউট</button>
        </div>
        <div class="card">
            <input type="text" id="roomId" placeholder="রুম আইডি" value="easy-premium-group">
            <input type="text" id="userId" placeholder="আপনার নাম">
            <div class="flex-btns">
                <button id="joinBtn">জয়েন করুন</button>
                <button id="leaveBtn" class="btn-danger" disabled>কল ছাড়ুন</button>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button id="testMicBtn" class="test-btn hidden">🎤 মাইক টেস্ট</button>
                <button id="forcePlayBtn" class="test-btn hidden">🔊 অডিও চালু করুন</button>
            </div>
        </div>
        <div id="statusArea" class="status">⚡ সংযোগ শুরু হয়নি</div>
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <strong>👥 সদস্য (<span id="participantCount">0</span>)</strong>
                <button id="micToggle" class="mic-btn" disabled>🎤 মাইক চালু</button>
            </div>
            <div id="participantGrid" class="participants-grid"><div style="color:gray;">কেউ নেই</div></div>
        </div>
        <div class="debug-log" id="debugLog"></div>
        <div class="footer" style="text-align: center; color: #aaa; margin-top: 10px;">
            🎧 কথা বললে বৃত্ত ঘুরবে | 🔊 অডিও না শুনলে "অডিও চালু করুন" বাটনে ক্লিক করুন
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBt9t6mcjUtXxX2igAJdseuIIc8pP_QPEw",
        authDomain: "easy-premium.firebaseapp.com",
        databaseURL: "https://easy-premium-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "easy-premium",
        storageBucket: "easy-premium.firebasestorage.app",
        messagingSenderId: "155891252265",
        appId: "1:155891252265:web:77ab41de24231e8e5ef038"
    };
    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    // ✅ সঠিক TURN ক্রেডেনশিয়াল
    const METERED_USERNAME = "b9edfe7cf7ed451c3c98484d";
    const METERED_PASSWORD = "sfu90VQVPjbjLaNN";
    
    // ICE সার্ভার - শুধু TURN (STUN ব্লক করে TURN ফোর্স করছি)
    const iceServers = [
        { urls: 'turn:global.turn.metered.ca:80', username: METERED_USERNAME, credential: METERED_PASSWORD },
        { urls: 'turn:global.turn.metered.ca:443', username: METERED_USERNAME, credential: METERED_PASSWORD },
        { urls: 'turn:global.turn.metered.ca:443?transport=tcp', username: METERED_USERNAME, credential: METERED_PASSWORD },
        { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
        { urls: 'stun:stun.l.google.com:19302' } // ব্যাকআপ
    ];

    // DOM elements
    const authSection = document.getElementById('authSection');
    const voiceSection = document.getElementById('voiceSection');
    const authStatus = document.getElementById('authStatus');
    const loginEmail = document.getElementById('loginEmail');
    const loginPassword = document.getElementById('loginPassword');
    const loginBtn = document.getElementById('loginBtn');
    const signupBtn = document.getElementById('signupBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const roomInput = document.getElementById('roomId');
    const userIdInput = document.getElementById('userId');
    const joinBtn = document.getElementById('joinBtn');
    const leaveBtn = document.getElementById('leaveBtn');
    const statusDiv = document.getElementById('statusArea');
    const participantGrid = document.getElementById('participantGrid');
    const participantCountSpan = document.getElementById('participantCount');
    const micToggleBtn = document.getElementById('micToggle');
    const debugLogDiv = document.getElementById('debugLog');
    const testMicBtn = document.getElementById('testMicBtn');
    const forcePlayBtn = document.getElementById('forcePlayBtn');

    let currentRoomId = null, currentUserId = null;
    let localStream = null, isMicActive = false;
    let peerConnections = new Map();
    let roomUsersRef = null;
    let remoteAudios = new Map();
    let localAnalyser = null, animFrame = null;
    let audioContext = null;

    function addLog(msg, isErr = false) {
        const div = document.createElement('div');
        const time = new Date().toLocaleTimeString();
        div.textContent = `[${time}] ${msg}`;
        div.style.color = isErr ? '#f87171' : '#86efac';
        div.style.marginBottom = '3px';
        div.style.fontSize = '0.7rem';
        debugLogDiv.appendChild(div);
        debugLogDiv.scrollTop = debugLogDiv.scrollHeight;
        while (debugLogDiv.children.length > 100) debugLogDiv.removeChild(debugLogDiv.firstChild);
        console.log(`[${time}] ${msg}`);
    }

    function showStatus(msg, isErr = false) {
        statusDiv.innerHTML = isErr ? `❌ ${msg}` : `✅ ${msg}`;
        statusDiv.style.background = isErr ? 'rgba(220,38,38,0.8)' : 'rgba(34,197,94,0.8)';
        addLog(msg, isErr);
    }

    function sanitizeUserId(id) {
        return id.replace(/[.#$\[\]\/]/g, '_').substring(0, 30);
    }

    // ফোর্স অডিও প্লে (ব্রাউজারের autoplay policy বাইপাস)
    function forcePlayAllAudios() {
        let played = 0;
        for (let [userId, audio] of remoteAudios) {
            if (audio && audio.paused) {
                audio.play().then(() => {
                    addLog(`🔊 ফোর্স প্লে সফল: ${userId}`);
                    played++;
                }).catch(e => addLog(`⚠️ ফোর্স প্লে ব্যর্থ ${userId}: ${e.message}`, true));
            }
        }
        if (played === 0 && remoteAudios.size > 0) {
            addLog(`ℹ️ ${remoteAudios.size}টি অডিও ইতিমধ্যে প্লে হচ্ছে`, false);
        }
    }

    async function testMicrophone() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const testCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = testCtx.createMediaStreamSource(stream);
            const analyser = testCtx.createAnalyser();
            source.connect(analyser);
            addLog("✅ মাইক কাজ করছে! 5 সেকেন্ড টেস্ট চলছে...");
            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            let maxVolume = 0;
            const interval = setInterval(() => {
                analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
                let avg = sum / dataArray.length;
                if (avg > maxVolume) maxVolume = avg;
                if (avg > 10) addLog(`🔊 ভলিউম: ${Math.floor(avg)}`);
            }, 100);
            setTimeout(() => {
                clearInterval(interval);
                stream.getTracks().forEach(t => t.stop());
                testCtx.close();
                addLog(`✅ টেস্ট শেষ। সর্বোচ্চ ভলিউম: ${Math.floor(maxVolume)}`);
                if (maxVolume < 20) addLog(`⚠️ মাইকের ভলিউম খুব কম! মাইক চেক করুন`, true);
            }, 5000);
        } catch(e) {
            addLog(`❌ মাইক টেস্ট ব্যর্থ: ${e.message}`, true);
        }
    }

    function updateParticipantsList(usersList) {
        if (!usersList || usersList.length === 0) {
            participantGrid.innerHTML = '<div style="color:gray; text-align:center;">কেউ নেই</div>';
            participantCountSpan.innerText = "0";
            return;
        }
        participantCountSpan.innerText = usersList.length;
        let html = '';
        for (let uid of usersList) {
            const isMe = (uid === currentUserId);
            const hasConnection = peerConnections.has(uid);
            const connectionBadge = hasConnection ? '<span class="connection-badge badge-connected"></span>' : '<span class="connection-badge badge-disconnected"></span>';
            html += `
                <div class="participant-circle" onclick="forcePlayAllAudios()">
                    <div class="circle" id="circle-${uid}"><span style="font-size:28px;">${isMe ? '🎤' : '👤'}</span></div>
                    <div class="participant-name">${connectionBadge}${uid.substring(0, 12)}${isMe ? ' (আপনি)' : ''}</div>
                </div>
            `;
        }
        participantGrid.innerHTML = html;
    }

    function updateCircleSpeaking(userId, isSpeaking) {
        const circle = document.getElementById(`circle-${userId}`);
        if (circle) {
            if (isSpeaking) circle.classList.add('speaking');
            else circle.classList.remove('speaking');
        }
    }

    function setupLocalVolumeDetection(stream) {
        if (localAnalyser && animFrame) cancelAnimationFrame(animFrame);
        if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
        
        const source = audioContext.createMediaStreamSource(stream);
        const analyser = audioContext.createAnalyser();
        analyser.fftSize = 256;
        const dataArray = new Uint8Array(analyser.frequencyBinCount);
        source.connect(analyser);
        localAnalyser = analyser;
        
        audioContext.resume().then(() => {
            addLog("🔊 লোকাল মাইক ডিটেক্টর চালু");
            function update() {
                if (!localAnalyser || !currentUserId) return;
                localAnalyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
                let avg = sum / dataArray.length;
                let isSpeakingNow = avg > 15;
                if (isSpeakingNow && avg > 45 && Math.random() < 0.05) {
                    addLog(`🗣️ কথা বলছেন (ভলিউম: ${Math.floor(avg)})`);
                }
                updateCircleSpeaking(currentUserId, isSpeakingNow);
                animFrame = requestAnimationFrame(update);
            }
            update();
        }).catch(e => addLog(`AudioContext resume failed: ${e.message}`, true));
    }

    async function createPeerConnection(targetUserId) {
        if (peerConnections.has(targetUserId)) {
            return peerConnections.get(targetUserId);
        }
        
        addLog(`🔌 নতুন সংযোগ তৈরি: ${targetUserId}`);
        const pc = new RTCPeerConnection({ 
            iceServers: iceServers,
            iceTransportPolicy: 'relay' // শুধু TURN ব্যবহার করতে বাধ্য করছে!
        });
        
        if (localStream) {
            localStream.getTracks().forEach(track => {
                pc.addTrack(track, localStream);
                addLog(`➕ ট্র্যাক যোগ: ${track.kind}`);
            });
        }
        
        pc.onicecandidate = (event) => {
            if (event.candidate) {
                addLog(`📡 ICE: ${event.candidate.type} ${event.candidate.protocol}`);
                db.ref(`voice_rooms/${currentRoomId}/candidates/${targetUserId}`).push({
                    from: currentUserId,
                    candidate: event.candidate
                }).catch(e => addLog(`ICE save failed: ${e.message}`, true));
            } else {
                addLog(`✅ ICE gathering complete for ${targetUserId}`);
            }
        };
        
        pc.ontrack = (event) => {
            addLog(`📢 রিমোট ট্র্যাক পেলাম ${targetUserId} (${event.streams[0].getAudioTracks().length} audio tracks)`);
            
            let audio = remoteAudios.get(targetUserId);
            if (!audio) {
                audio = new Audio();
                audio.autoplay = false; // autoplay বন্ধ, ম্যানুয়াল প্লে করব
                audio.style.display = 'none';
                audio.volume = 1.0;
                document.body.appendChild(audio);
                remoteAudios.set(targetUserId, audio);
                
                // ইউজার ইন্টারঅ্যাকশনে প্লে করবে
                audio.addEventListener('canplay', () => {
                    addLog(`🎵 অডিও রেডি: ${targetUserId}`);
                });
            }
            
            audio.srcObject = event.streams[0];
            
            // ব্রাউজারের autoplay পলিসি বাইপাস করতে setTimeout
            setTimeout(() => {
                audio.play().then(() => {
                    addLog(`✅ অডিও প্লে শুরু: ${targetUserId}`);
                }).catch(e => {
                    addLog(`⚠️ অডিও প্লে ব্যর্থ (ইউজার ইন্টারঅ্যাকশন দরকার): ${e.message}`, true);
                    showStatus("অডিও শুনতে 'অডিও চালু করুন' বাটনে ক্লিক করুন", true);
                });
            }, 100);
        };
        
        pc.onconnectionstatechange = () => {
            addLog(`🔗 সংযোগ স্টেট ${targetUserId}: ${pc.connectionState}`);
            if (pc.connectionState === 'connected') {
                showStatus(`${targetUserId} সংযুক্ত`);
                updateParticipantsList(Array.from(peerConnections.keys()).concat([currentUserId]));
            } else if (pc.connectionState === 'failed') {
                addLog(`❌ সংযোগ ব্যর্থ ${targetUserId}`, true);
                peerConnections.delete(targetUserId);
            }
        };
        
        pc.oniceconnectionstatechange = () => {
            addLog(`🧊 ICE স্টেট ${targetUserId}: ${pc.iceConnectionState}`);
            if (pc.iceConnectionState === 'connected') {
                addLog(`✅ TURN সংযোগ সফল ${targetUserId}`);
            } else if (pc.iceConnectionState === 'failed') {
                addLog(`❌ ICE ব্যর্থ ${targetUserId} - TURN সার্ভার চেক করুন`, true);
            }
        };
        
        peerConnections.set(targetUserId, pc);
        return pc;
    }

    async function callUser(targetUserId) {
        if (targetUserId === currentUserId) return;
        if (peerConnections.has(targetUserId)) {
            addLog(`ℹ️ ইতিমধ্যে সংযুক্ত: ${targetUserId}`);
            return;
        }
        
        addLog(`📞 কল করছি ${targetUserId}`);
        try {
            const pc = await createPeerConnection(targetUserId);
            
            // ICE gathering timeout (3 সেকেন্ড)
            setTimeout(async () => {
                if (pc.iceGatheringState !== 'complete') {
                    addLog(`⚠️ ICE gathering timeout for ${targetUserId}, forcing offer`);
                    try {
                        const offer = await pc.createOffer();
                        await pc.setLocalDescription(offer);
                        await db.ref(`voice_rooms/${currentRoomId}/offers/${targetUserId}`).push({
                            from: currentUserId,
                            offer: { type: offer.type, sdp: offer.sdp }
                        });
                    } catch(e) {
                        addLog(`Force offer failed: ${e.message}`, true);
                    }
                }
            }, 3000);
            
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            
            await db.ref(`voice_rooms/${currentRoomId}/offers/${targetUserId}`).push({
                from: currentUserId,
                offer: { type: offer.type, sdp: offer.sdp }
            });
            addLog(`📤 Offer পাঠানো হয়েছে ${targetUserId}`);
        } catch(e) {
            addLog(`Offer তৈরি ব্যর্থ: ${e.message}`, true);
        }
    }

    function setupListeners() {
        // Offer listener
        const offerRef = db.ref(`voice_rooms/${currentRoomId}/offers/${currentUserId}`);
        offerRef.on('child_added', async (snapshot) => {
            const data = snapshot.val();
            if (!data || data.from === currentUserId) return;
            
            addLog(`📨 Offer পেয়েছি ${data.from}`);
            try {
                let pc = peerConnections.get(data.from);
                if (!pc) pc = await createPeerConnection(data.from);
                
                await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                
                await db.ref(`voice_rooms/${currentRoomId}/answers/${data.from}`).push({
                    from: currentUserId,
                    answer: { type: answer.type, sdp: answer.sdp }
                });
                await snapshot.ref.remove();
                addLog(`✅ Answer পাঠানো হয়েছে ${data.from}`);
            } catch(e) {
                addLog(`Offer প্রসেস ব্যর্থ: ${e.message}`, true);
            }
        });
        
        // Answer listener
        const answerRef = db.ref(`voice_rooms/${currentRoomId}/answers/${currentUserId}`);
        answerRef.on('child_added', async (snapshot) => {
            const data = snapshot.val();
            if (!data || data.from === currentUserId) return;
            
            addLog(`📨 Answer পেয়েছি ${data.from}`);
            const pc = peerConnections.get(data.from);
            if (pc && pc.signalingState === 'have-local-offer') {
                try {
                    await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
                    await snapshot.ref.remove();
                    addLog(`✅ Answer সেট করা হয়েছে ${data.from}`);
                } catch(e) {
                    addLog(`Answer সেট ব্যর্থ: ${e.message}`, true);
                }
            }
        });
        
        // Candidate listener
        const candidateRef = db.ref(`voice_rooms/${currentRoomId}/candidates/${currentUserId}`);
        candidateRef.on('child_added', async (snapshot) => {
            const data = snapshot.val();
            if (!data || data.from === currentUserId) return;
            
            const pc = peerConnections.get(data.from);
            if (pc && data.candidate) {
                try {
                    await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
                    addLog(`✅ ICE যোগ হয়েছে ${data.from}`);
                    await snapshot.ref.remove();
                } catch(e) {
                    addLog(`ICE যোগ ব্যর্থ: ${e.message}`, true);
                }
            }
        });
    }

    async function joinCall() {
        let room = roomInput.value.trim();
        let userId = userIdInput.value.trim();
        if (!room) { showStatus("রুম আইডি দিন", true); return; }
        if (!userId) { userId = "User_" + Math.floor(Math.random()*10000); userIdInput.value = userId; }
        
        userId = sanitizeUserId(userId);
        currentRoomId = room;
        currentUserId = userId;
        
        joinBtn.disabled = true;
        leaveBtn.disabled = false;
        
        showStatus("মাইক্রোফোন অনুমতি নিচ্ছি...");
        
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ 
                audio: {
                    echoCancellation: true,
                    noiseSuppression: true,
                    autoGainControl: true,
                    sampleRate: 48000
                } 
            });
            
            isMicActive = true;
            micToggleBtn.disabled = false;
            micToggleBtn.innerText = '🔇 মাইক বন্ধ';
            testMicBtn.classList.remove('hidden');
            forcePlayBtn.classList.remove('hidden');
            
            addLog("✅ মাইক্রোফোন অনুমতি প্রাপ্ত");
            setupLocalVolumeDetection(localStream);
            
            // Firebase এ যোগ
            await db.ref(`voice_rooms/${currentRoomId}/users/${currentUserId}`).set({
                joined: Date.now(),
                name: userId
            });
            
            addLog("✅ Firebase এ নিবন্ধন সফল");
            setupListeners();
            
            // রুমের বর্তমান ইউজারদের তালিকা
            const usersSnapshot = await db.ref(`voice_rooms/${currentRoomId}/users`).once('value');
            const users = usersSnapshot.val() || {};
            const otherUsers = Object.keys(users).filter(uid => uid !== currentUserId);
            
            addLog(`👥 রুমে ${otherUsers.length} জন সদস্য আছেন`);
            
            // অন্য ইউজারদের সাথে সংযোগ
            for (let uid of otherUsers) {
                setTimeout(() => callUser(uid), 500);
            }
            
            // নতুন ইউজার যোগ হলে কল করবে
            const newUserRef = db.ref(`voice_rooms/${currentRoomId}/users`);
            newUserRef.on('child_added', (snap) => {
                const uid = snap.key;
                if (uid !== currentUserId && !peerConnections.has(uid)) {
                    addLog(`🆕 নতুন সদস্য: ${uid}`);
                    setTimeout(() => callUser(uid), 500);
                }
                const currentUsers = Array.from(peerConnections.keys()).concat([currentUserId]);
                updateParticipantsList(currentUsers);
            });
            
            newUserRef.on('child_removed', (snap) => {
                const uid = snap.key;
                addLog(`🚪 সদস্য চলে গেছেন: ${uid}`);
                if (peerConnections.has(uid)) {
                    peerConnections.get(uid).close();
                    peerConnections.delete(uid);
                }
                if (remoteAudios.has(uid)) {
                    const audio = remoteAudios.get(uid);
                    if (audio.parentNode) audio.remove();
                    remoteAudios.delete(uid);
                }
                const currentUsers = Array.from(peerConnections.keys()).concat([currentUserId]);
                updateParticipantsList(currentUsers);
            });
            
            roomUsersRef = newUserRef;
            updateParticipantsList(otherUsers.concat([currentUserId]));
            showStatus("রুমে জয়েন করেছেন! কথা বলুন");
            
            // 5 সেকেন্ড পর সংযোগ স্ট্যাটাস চেক
            setTimeout(() => {
                addLog(`📊 সংযোগ স্ট্যাটাস: ${peerConnections.size}টি সক্রিয় সংযোগ`);
                if (peerConnections.size === 0 && otherUsers.length > 0) {
                    addLog(`⚠️ কোন সংযোগ তৈরি হয়নি! TURN সার্ভার চেক করুন`, true);
                }
            }, 5000);
            
        } catch(err) {
            addLog(`❌ জয়েন ব্যর্থ: ${err.message}`, true);
            showStatus(`মাইক্রোফোন অনুমতি দেননি: ${err.message}`, true);
            joinBtn.disabled = false;
            leaveBtn.disabled = true;
            currentRoomId = null;
            currentUserId = null;
            if (localStream) localStream.getTracks().forEach(t => t.stop());
            localStream = null;
        }
    }
    
    async function leaveCall() {
        if (!currentRoomId || !currentUserId) return;
        
        addLog("🚪 কল ছাড়ছি...");
        if (animFrame) cancelAnimationFrame(animFrame);
        
        for (let [uid, pc] of peerConnections) {
            pc.close();
        }
        peerConnections.clear();
        
        remoteAudios.forEach(audio => {
            if (audio.parentNode) audio.remove();
        });
        remoteAudios.clear();
        
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
            localStream = null;
        }
        
        if (roomUsersRef) {
            await db.ref(`voice_rooms/${currentRoomId}/users/${currentUserId}`).remove();
            roomUsersRef.off();
        }
        
        currentRoomId = null;
        currentUserId = null;
        joinBtn.disabled = false;
        leaveBtn.disabled = true;
        micToggleBtn.disabled = true;
        testMicBtn.classList.add('hidden');
        forcePlayBtn.classList.add('hidden');
        showStatus("কল ছেড়েছেন");
        participantGrid.innerHTML = '<div style="color:gray;">কেউ নেই</div>';
        participantCountSpan.innerText = "0";
    }
    
    function toggleMic() {
        if (!localStream) return;
        const audioTrack = localStream.getAudioTracks()[0];
        if (audioTrack) {
            audioTrack.enabled = !audioTrack.enabled;
            isMicActive = audioTrack.enabled;
            micToggleBtn.innerText = isMicActive ? '🔇 মাইক বন্ধ' : '🎤 মাইক চালু';
            showStatus(isMicActive ? "মাইক চালু" : "মাইক বন্ধ");
        }
    }
    
    // Authentication
    loginBtn.onclick = async () => {
        const email = loginEmail.value.trim();
        const pwd = loginPassword.value.trim();
        if (!email || !pwd) return showAuthStatus("ইমেইল ও পাসওয়ার্ড দিন", true);
        try {
            await auth.signInWithEmailAndPassword(email, pwd);
            showAuthStatus("লগইন সফল!");
        } catch(e) {
            showAuthStatus(e.message, true);
        }
    };
    
    signupBtn.onclick = async () => {
        const email = loginEmail.value.trim();
        const pwd = loginPassword.value.trim();
        if (!email || !pwd) return showAuthStatus("ইমেইল ও পাসওয়ার্ড দিন", true);
        try {
            await auth.createUserWithEmailAndPassword(email, pwd);
            showAuthStatus("অ্যাকাউন্ট তৈরি সফল!");
        } catch(e) {
            showAuthStatus(e.message, true);
        }
    };
    
    logoutBtn.onclick = async () => {
        if (currentRoomId) await leaveCall();
        await auth.signOut();
    };
    
    function showAuthStatus(msg, isErr) {
        authStatus.innerHTML = isErr ? `❌ ${msg}` : `✅ ${msg}`;
        authStatus.style.background = isErr ? '#fed7d7' : '#c6f6d5';
        setTimeout(() => { authStatus.innerHTML = ''; }, 3000);
    }
    
    auth.onAuthStateChanged(user => {
        if (user) {
            authSection.classList.add('hidden');
            voiceSection.classList.remove('hidden');
            addLog(`✅ লগইন: ${user.email}`);
        } else {
            authSection.classList.remove('hidden');
            voiceSection.classList.add('hidden');
            if (currentRoomId) leaveCall();
        }
    });
    
    joinBtn.onclick = joinCall;
    leaveBtn.onclick = leaveCall;
    micToggleBtn.onclick = toggleMic;
    testMicBtn.onclick = testMicrophone;
    forcePlayBtn.onclick = forcePlayAllAudios;
    
    window.forcePlayAllAudios = forcePlayAllAudios; // onclick এর জন্য global
    
    window.addEventListener('beforeunload', () => {
        if (currentRoomId && currentUserId) {
            db.ref(`voice_rooms/${currentRoomId}/users/${currentUserId}`).remove();
        }
        if (localStream) localStream.getTracks().forEach(t => t.stop());
        peerConnections.forEach(pc => pc.close());
    });
</script>
</body>
</html>
