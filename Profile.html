<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>আমার প্রোফাইল · Easy Premium</title>
    <meta name="theme-color" content="#0a0a1a">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html,body { background:#0a0a1a; width:100%; min-height:100vh; color:#fff; font-family:'Segoe UI','Noto Sans Bengali',sans-serif; }
        body { padding:20px; display:flex; justify-content:center; background:linear-gradient(135deg,#0a0a1a 0%,#121230 50%,#1a1a3a 100%); background-attachment:fixed; }
        .container { width:100%; max-width:700px; margin:0 auto; }
        .header { text-align:center; margin-bottom:25px; }
        .header h1 { color:#ff9800; font-size:32px; text-shadow:0 2px 10px rgba(255,152,0,0.3); }
        .header p { color:#00bcd4; font-size:16px; margin-top:5px; }
        .card { background:rgba(20,20,40,0.9); backdrop-filter:blur(10px); border:1px solid rgba(255,152,0,0.3); border-radius:20px; padding:25px; margin-bottom:20px; box-shadow:0 10px 30px rgba(0,0,0,0.5); }
        .loading { text-align:center; padding:30px; }
        .spinner { border:4px solid rgba(255,255,255,0.2); border-top:4px solid #ff9800; border-radius:50%; width:50px; height:50px; animation:spin 1s linear infinite; margin:0 auto 20px; }
        @keyframes spin { 0%{transform:rotate(0deg);}100%{transform:rotate(360deg);} }
        .error { text-align:center; padding:30px; color:#ff6b6b; background:rgba(255,107,107,0.1); border-radius:16px; border:1px solid #ff6b6b; }
        .user-info { display:flex; align-items:center; gap:20px; margin-bottom:30px; padding-bottom:20px; border-bottom:2px solid #ff9800; }
        .avatar { width:70px; height:70px; border-radius:50%; background:#ff9800; display:flex; align-items:center; justify-content:center; font-size:2rem; font-weight:bold; color:#0a0a1a; overflow:hidden; }
        .avatar img { width:100%; height:100%; object-fit:cover; }
        .user-details { flex:1; }
        .user-name { font-size:1.5rem; font-weight:700; color:#ff9800; margin-bottom:5px; }
        .user-email { color:#b0bec5; font-size:0.95rem; word-break:break-word; }
        .orders-section { margin-top:20px; }
        .section-title { font-size:1.2rem; color:#00bcd4; margin-bottom:20px; padding-bottom:10px; border-bottom:1px solid rgba(0,188,212,0.3); }
        .no-orders { text-align:center; color:#b0bec5; padding:40px 20px; font-size:1.1rem; }
        .orders-cards { display:flex; flex-direction:column; gap:12px; }
        .order-card { background:rgba(255,255,255,0.05); border-radius:10px; padding:15px; border-left:4px solid #ff9800; transition:0.2s; }
        .order-card[data-voucher-link]:not([data-voucher-link=""]) { cursor:pointer; }
        .order-card[data-voucher-link]:not([data-voucher-link=""]):hover { background:rgba(255,152,0,0.1); border-left-color:#00bcd4; }
        .order-row { display:flex; justify-content:space-between; margin-bottom:8px; padding-bottom:8px; border-bottom:1px solid rgba(255,152,0,0.2); }
        .order-row:last-child { margin-bottom:0; padding-bottom:0; border-bottom:none; }
        .order-label { color:#b0bec5; font-size:0.9rem; }
        .order-value { color:#fff; font-size:1rem; font-weight:500; text-align:right; }
        .status-badge { display:inline-block; padding:4px 12px; border-radius:30px; font-size:0.85rem; font-weight:600; }
        .status-pending { background:rgba(255,152,0,0.2); color:#ff9800; border:1px solid #ff9800; }
        .status-completed { background:rgba(76,175,80,0.2); color:#4caf50; border:1px solid #4caf50; }
        .status-cancelled { background:rgba(220,53,69,0.2); color:#dc3545; border:1px solid #dc3545; }
        .footer { text-align:center; color:#888; font-size:0.8rem; margin-top:30px; padding-top:20px; border-top:1px solid rgba(255,152,0,0.2); }
        .back-btn { background:transparent; border:1px solid #ff9800; color:#ff9800; padding:10px 20px; border-radius:8px; cursor:pointer; font-size:1rem; transition:0.3s; margin-bottom:20px; display:inline-flex; align-items:center; gap:8px; }
        .back-btn:hover { background:#ff9800; color:#0a0a1a; }
        @media (max-width:500px){ .user-info{flex-direction:column;align-items:flex-start;} .avatar{width:60px;height:60px;} }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>EASY PREMIUM</h1>
            <p>আমার প্রোফাইল</p>
        </div>
        <div id="profileContent" class="card">
            <div class="loading">
                <div class="spinner"></div>
                <p>লোড হচ্ছে...</p>
            </div>
        </div>
        <div class="footer">
            <p>© 2026 Easy Premium · সর্বস্বত্ব সংরক্ষিত</p>
        </div>
    </div>

    <script>
        (function() {
            const firebaseConfig = {
                apiKey: "AIzaSyBt9t6mcjUtXxX2igAJdseuIIc8pP_QPEw",
                authDomain: "easy-premium.firebaseapp.com",
                databaseURL: "https://easy-premium-default-rtdb.asia-southeast1.firebasedatabase.app",
                projectId: "easy-premium",
                storageBucket: "easy-premium.firebasestorage.app",
                messagingSenderId: "155891252265",
                appId: "1:155891252265:web:77ab41de24231e8e5ef038"
            };
            firebase.initializeApp(firebaseConfig);
            const database = firebase.database();
            const auth = firebase.auth();

            const profileContent = document.getElementById('profileContent');

            function formatDate(iso) {
                if (!iso) return 'N/A';
                try {
                    const d = new Date(iso);
                    return d.toLocaleDateString('bn-BD', { year: 'numeric', month: 'long', day: 'numeric' }) + ' ' + d.toLocaleTimeString('bn-BD', { hour: '2-digit', minute: '2-digit' });
                } catch { return iso; }
            }

            function getStatusClass(status) {
                if (status === 'completed') return 'status-completed';
                if (status === 'cancelled') return 'status-cancelled';
                return 'status-pending';
            }

            function getStatusBangla(status) {
                if (status === 'completed') return 'সম্পন্ন';
                if (status === 'cancelled') return 'বাতিল';
                return 'অপেক্ষমান';
            }

            // নতুন ফাংশন: ভাউচার লিংকে ক্লিক হ্যান্ডলার যুক্ত করা
            function attachVoucherClickHandlers() {
                // পুরানো কোনো ইভেন্ট লিসেনার সরাতে প্রতিটি কার্ড ক্লোন ও রিপ্লেস করা হয়
                document.querySelectorAll('.order-card').forEach(card => {
                    const newCard = card.cloneNode(true);
                    card.parentNode.replaceChild(newCard, card);
                });

                // নতুন কার্ডে ইভেন্ট লিসেনার যুক্ত করা
                document.querySelectorAll('.order-card').forEach(card => {
                    const link = card.dataset.voucherLink;
                    if (link) {
                        card.style.cursor = 'pointer';
                        card.addEventListener('click', (e) => {
                            // নতুন ট্যাবে ভাউচার লিংক খোলা (যাতে প্রোফাইল পেজ খোলা থাকে)
                            window.open(link, '_blank');
                        });
                    }
                });
            }

            function renderProfile(user, orders) {
                const avatarHtml = user.photoURL 
                    ? `<img src="${user.photoURL}" alt="avatar">`
                    : `<span>${(user.displayName || user.email).charAt(0).toUpperCase()}</span>`;

                let ordersHtml = '';
                if (orders.length === 0) {
                    ordersHtml = '<div class="no-orders">কোন অর্ডার নেই</div>';
                } else {
                    ordersHtml = '<div class="orders-cards">';
                    orders.forEach(order => {
                        const statusClass = getStatusClass(order.status);
                        const statusBangla = getStatusBangla(order.status);
                        // ভাউচার লিংক বের করা (voucherData.voucherLink থাকলে)
                        const voucherLink = order.voucherData?.voucherLink || '';
                        ordersHtml += `
                            <div class="order-card" data-voucher-link="${voucherLink}">
                                <div class="order-row"><span class="order-label">প্ল্যাটফর্ম</span><span class="order-value">${order.platform || '—'}</span></div>
                                <div class="order-row"><span class="order-label">মূল্য</span><span class="order-value">${order.price || '—'}</span></div>
                                <div class="order-row"><span class="order-label">অর্ডার আইডি</span><span class="order-value">${order.orderId || '—'}</span></div>
                                <div class="order-row"><span class="order-label">তারিখ</span><span class="order-value">${formatDate(order.orderDate)}</span></div>
                                <div class="order-row"><span class="order-label">স্ট্যাটাস</span><span class="order-value"><span class="status-badge ${statusClass}">${statusBangla}</span></span></div>
                            </div>
                        `;
                    });
                    ordersHtml += '</div>';
                }

                return `
                    <div class="user-info">
                        <div class="avatar">${avatarHtml}</div>
                        <div class="user-details">
                            <div class="user-name">${user.displayName || 'ব্যবহারকারী'}</div>
                            <div class="user-email">${user.email}</div>
                        </div>
                    </div>
                    <div class="orders-section">
                        <div class="section-title">আপনার অর্ডার সমূহ</div>
                        ${ordersHtml}
                    </div>
                `;
            }

            auth.onAuthStateChanged(async (user) => {
                if (!user) {
                    window.location.href = 'https://www.easy-premium.com'; // লগইন না থাকলে মূল পৃষ্ঠায় ফেরত
                    return;
                }

                try {
                    const snapshot = await database.ref(`userOrders/${user.uid}`).once('value');
                    const orders = [];
                    snapshot.forEach(child => {
                        orders.push({ id: child.key, ...child.val() });
                    });
                    // নতুন থেকে পুরাতন সাজানো
                    orders.sort((a, b) => (b.orderDate || '').localeCompare(a.orderDate || ''));

                    // প্রোফাইল HTML রেন্ডার
                    profileContent.innerHTML = renderProfile(user, orders);
                    
                    // ভাউচার লিংকে ক্লিক হ্যান্ডলার অ্যাটাচ করুন
                    attachVoucherClickHandlers();
                } catch (error) {
                    profileContent.innerHTML = `<div class="error"><i class="fas fa-exclamation-triangle"></i> তথ্য লোড করতে সমস্যা হয়েছে: ${error.message}</div>`;
                }
            });
        })();
    </script>
</body>
</html>
