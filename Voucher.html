<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ভাউচার – Easy Premium</title>
    <meta name="description" content="আপনার ক্রয়কৃত ভাউচার দেখুন ও ব্যবহার করুন।">
    <link rel="icon" type="image/x-icon" href="https://cdn-icons-png.flaticon.com/512/8701/8701941.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        /* ========== মূল ওয়েবসাইটের মতো স্টাইল ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Noto Sans Bengali', sans-serif;
            -webkit-tap-highlight-color: transparent;
            color: #fff;
        }
        html {
            scroll-behavior: smooth;
            overflow-x: hidden;
            width: 100%;
            height: 100%;
            background-color: #0a0a1a;
        }
        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #121230 50%, #1a1a3a 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 30%, rgba(255,152,0,0.05) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(0,188,212,0.05) 0%, transparent 50%);
            z-index: -1;
            pointer-events: none;
        }
        .voucher-container {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
        }
        .voucher-card {
            background: rgba(20,20,40,0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 2px solid #ff9800;
            padding: 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            transition: 0.3s;
        }
        .voucher-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }
        .icon {
            font-size: 4rem;
            color: #ff9800;
            margin-bottom: 20px;
        }
        h2 {
            color: #ff9800;
            font-size: 1.8rem;
            margin-bottom: 15px;
        }
        .voucher-code {
            background: rgba(0,0,0,0.6);
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            word-break: break-all;
            font-family: monospace;
            font-size: 1.2rem;
            font-weight: bold;
            color: #00bcd4;
            border: 1px dashed #ff9800;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            margin: 15px 0;
            padding: 8px;
            border-bottom: 1px solid rgba(255,152,0,0.3);
        }
        .info-label {
            color: #b0bec5;
            font-weight: 500;
        }
        .info-value {
            color: #fff;
            font-weight: 600;
        }
        .btn {
            background: linear-gradient(45deg, #ff9800, #ff5722);
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            color: white;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 20px;
            text-decoration: none;
        }
        .btn-secondary {
            background: transparent;
            border: 1px solid #ff9800;
            color: #ff9800;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255,152,0,0.4);
        }
        .loading {
            text-align: center;
            padding: 40px;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid #ff9800;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error {
            background: rgba(220,53,69,0.2);
            border: 1px solid #dc3545;
            border-radius: 12px;
            padding: 20px;
            color: #ff6b6b;
        }
        .back-home {
            margin-top: 30px;
            text-align: center;
        }
        .back-home a {
            color: #ff9800;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-home a:hover {
            text-decoration: underline;
        }
        @media (max-width: 500px) {
            .voucher-card { padding: 20px; }
            .voucher-code { font-size: 1rem; }
            .info-row { flex-direction: column; gap: 5px; text-align: center; }
            .info-value { text-align: center; }
        }
    </style>
</head>
<body>
    <div class="voucher-container">
        <div id="voucherContent">
            <div class="loading">
                <div class="spinner"></div>
                <p>ভাউচার লোড হচ্ছে...</p>
            </div>
        </div>
        <div class="back-home">
            <a href="https://www.easy-premium.com">← হোমপেজে ফিরে যান</a>
        </div>
    </div>

    <script>
        // Firebase config (same as main site)
        const firebaseConfig = {
            apiKey: "AIzaSyBt9t6mcjUtXxX2igAJdseuIIc8pP_QPEw",
            authDomain: "easy-premium.firebaseapp.com",
            databaseURL: "https://easy-premium-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "easy-premium",
            storageBucket: "easy-premium.firebasestorage.app",
            messagingSenderId: "155891252265",
            appId: "1:155891252265:web:77ab41de24231e8e5ef038"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const voucherContent = document.getElementById('voucherContent');

        // Helper: get query parameter
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        // Decode the base64 data
        function decodeData(encoded) {
            try {
                const decoded = atob(decodeURIComponent(encoded));
                const parts = decoded.split('|');
                if (parts.length >= 5) {
                    return {
                        orderId: parts[0],
                        platformId: parts[1],
                        price: parts[2],
                        timestamp: parts[3],
                        userId: parts[4],
                        email: parts[5] || '',
                        adminGeneratedAt: parts[6] || ''
                    };
                }
                return null;
            } catch (e) {
                console.error('Decode error:', e);
                return null;
            }
        }

        // Show error message
        function showError(message) {
            voucherContent.innerHTML = `
                <div class="voucher-card">
                    <div class="icon"><i class="fas fa-exclamation-triangle"></i></div>
                    <h2>ত্রুটি</h2>
                    <div class="error">${message}</div>
                    <button onclick="window.location.href='https://www.easy-premium.com'" class="btn btn-secondary">হোমে যান</button>
                </div>
            `;
        }

        // Show voucher
        function showVoucher(transaction) {
            const voucherLink = transaction.voucherLink || transaction.voucherCode || '';
            const voucherCode = voucherLink.split('/').pop() || voucherLink; // try to extract code if it's a URL
            const platform = transaction.platform || 'Easy Premium';
            const price = transaction.price || '—';
            const orderId = transaction.orderId || '—';

            voucherContent.innerHTML = `
                <div class="voucher-card">
                    <div class="icon"><i class="fas fa-ticket-alt"></i></div>
                    <h2>ভাউচার প্রস্তুত</h2>
                    <div class="info-row">
                        <span class="info-label">প্ল্যাটফর্ম</span>
                        <span class="info-value">${escapeHtml(platform)}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">মূল্য</span>
                        <span class="info-value">${escapeHtml(price)}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">অর্ডার আইডি</span>
                        <span class="info-value">${escapeHtml(orderId)}</span>
                    </div>
                    <div class="voucher-code" id="voucherCode">${escapeHtml(voucherLink)}</div>
                    <button class="btn" id="copyBtn"><i class="fas fa-copy"></i> কপি করুন</button>
                    <button class="btn btn-secondary" id="goHomeBtn"><i class="fas fa-home"></i> হোমপেজ</button>
                </div>
            `;

            // Copy functionality
            document.getElementById('copyBtn').addEventListener('click', () => {
                const code = document.getElementById('voucherCode').innerText;
                navigator.clipboard.writeText(code).then(() => {
                    alert('ভাউচার কপি করা হয়েছে!');
                }).catch(() => {
                    alert('কপি করতে ব্যর্থ');
                });
            });

            document.getElementById('goHomeBtn').addEventListener('click', () => {
                window.location.href = 'https://www.easy-premium.com';
            });
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Main execution
        (async function() {
            const encodedData = getQueryParam('data');
            if (!encodedData) {
                showError('ভাউচার তথ্য পাওয়া যায়নি। দয়া করে সঠিক লিংক ব্যবহার করুন।');
                return;
            }

            const decoded = decodeData(encodedData);
            if (!decoded || !decoded.orderId) {
                showError('ভাউচার ডাটা সঠিক নয়।');
                return;
            }

            const orderId = decoded.orderId;
            try {
                const snapshot = await database.ref(`transactions/${orderId}`).once('value');
                const transaction = snapshot.val();

                if (!transaction) {
                    showError('ভাউচার পাওয়া যায়নি। অর্ডারটি বিদ্যমান নয়।');
                    return;
                }

                if (transaction.status === 'redeemed' || transaction.status === 'used') {
                    showError('এই ভাউচার ইতিমধ্যে ব্যবহার করা হয়েছে।');
                    return;
                }

                // If no voucher link, maybe it's still pending? Show pending message
                if (!transaction.voucherLink && !transaction.voucherCode) {
                    showError('ভাউচার এখনো প্রস্তুত হয়নি। অনুগ্রহ করে কিছুক্ষণ পরে চেষ্টা করুন অথবা সহায়তা নিন।');
                    return;
                }

                // Show voucher
                showVoucher(transaction);

                // After displaying, delete/update the transaction to prevent reuse
                await database.ref(`transactions/${orderId}`).update({
                    status: 'redeemed',
                    viewedAt: firebase.database.ServerValue.TIMESTAMP
                });
                // Optionally also remove from userOrders? But that may be needed for order history.
                // We'll keep it but mark as redeemed.

            } catch (error) {
                console.error('Error fetching transaction:', error);
                showError('ভাউচার লোড করতে সমস্যা হয়েছে। নেটওয়ার্ক সংযোগ পরীক্ষা করুন।');
            }
        })();
    </script>
</body>
</html>
