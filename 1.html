<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Voice Reviews – Easy Premium</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Firebase SDK (Compat version – works with your config) -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
            background: rgba(0,0,0,0.3);
            padding: 15px 25px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }
        .logo h1 {
            font-size: 1.8rem;
            background: linear-gradient(45deg, #ff9800, #ff5722);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .auth-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.1);
            padding: 5px 15px 5px 8px;
            border-radius: 50px;
        }
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #ff9800;
        }
        .user-email {
            font-size: 0.85rem;
            max-width: 180px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .btn {
            background: linear-gradient(45deg, #ff9800, #ff5722);
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            color: white;
            font-size: 0.9rem;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #ff9800;
        }
        .btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(255,152,0,0.4);
        }
        /* Upload Card */
        .upload-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 40px;
            border: 1px solid rgba(255,152,0,0.3);
        }
        .record-area {
            text-align: center;
        }
        .record-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #ff5722;
            border: none;
            font-size: 2rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 0 15px rgba(255,87,34,0.5);
        }
        .record-btn.recording {
            background: #dc3545;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(220,53,69,0.7);}
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(220,53,69,0);}
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(220,53,69,0);}
        }
        .audio-preview {
            margin: 20px 0;
        }
        audio {
            width: 100%;
            max-width: 400px;
            border-radius: 40px;
        }
        .upload-status {
            margin-top: 15px;
            font-size: 0.9rem;
        }
        /* Reviews Grid */
        .reviews-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }
        .review-card {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            padding: 20px;
            transition: 0.2s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .review-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
        }
        .review-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #ff9800;
        }
        .review-info {
            flex: 1;
        }
        .review-email {
            font-size: 0.8rem;
            color: #ff9800;
            word-break: break-all;
        }
        .review-date {
            font-size: 0.7rem;
            color: #ccc;
        }
        .audio-player {
            width: 100%;
            margin: 15px 0;
        }
        .no-reviews {
            text-align: center;
            padding: 50px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            grid-column: 1 / -1;
        }
        .loading {
            text-align: center;
            padding: 40px;
        }
        footer {
            text-align: center;
            margin-top: 50px;
            padding: 20px;
            font-size: 0.8rem;
            opacity: 0.7;
        }
        @media (max-width: 600px) {
            .header { flex-direction: column; text-align: center; }
            .auth-area { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">
            <h1><i class="fas fa-microphone-alt"></i> Voice Reviews</h1>
            <p>আপনার মতামত দিন ভয়েসের মাধ্যমে</p>
        </div>
        <div class="auth-area" id="authArea">
            <div id="userInfo" style="display: none;" class="user-info">
                <img id="userAvatar" class="user-avatar" alt="avatar">
                <span id="userEmail" class="user-email"></span>
                <button id="logoutBtn" class="btn btn-outline">Logout</button>
            </div>
            <button id="loginBtn" class="btn">Google Sign In</button>
        </div>
    </div>

    <!-- Upload section (only visible when logged in) -->
    <div id="uploadSection" style="display: none;" class="upload-card">
        <h3><i class="fas fa-head-side-microphone"></i> আপনার ভয়েস রিভিউ দিন</h3>
        <div class="record-area">
            <button id="recordBtn" class="record-btn"><i class="fas fa-microphone"></i></button>
            <p id="recordingStatus" style="margin-top: 10px;">রেকর্ড করতে ক্লিক করুন</p>
            <div id="previewArea" class="audio-preview" style="display: none;">
                <audio id="audioPreview" controls></audio>
                <br>
                <button id="uploadBtn" class="btn" style="margin-top: 10px;">আপলোড করুন</button>
                <button id="cancelBtn" class="btn btn-outline" style="margin-left: 10px;">বাতিল</button>
            </div>
            <div id="uploadStatus" class="upload-status"></div>
        </div>
    </div>

    <!-- Public reviews list -->
    <h2><i class="fas fa-star-of-life"></i> সকল ভয়েস রিভিউ</h2>
    <div id="reviewsContainer" class="reviews-grid">
        <div class="loading"><i class="fas fa-spinner fa-pulse"></i> লোড হচ্ছে...</div>
    </div>
    <footer>
        <p>🔊 যে কেউ রিভিউ শুনতে পারবেন। রিভিউ দিতে শুধু Google অ্যাকাউন্ট দিয়ে লগইন করুন।</p>
    </footer>
</div>

<script>
    // ================== YOUR FIREBASE CONFIGURATION ==================
    const firebaseConfig = {
        apiKey: "AIzaSyBt9t6mcjUtXxX2igAJdseuIIc8pP_QPEw",
        authDomain: "easy-premium.firebaseapp.com",
        databaseURL: "https://easy-premium-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "easy-premium",
        storageBucket: "easy-premium.firebasestorage.app",
        messagingSenderId: "155891252265",
        appId: "1:155891252265:web:77ab41de24231e8e5ef038",
        measurementId: "G-CHL8K8HRPX"
    };

    // Initialize Firebase (compat version)
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const database = firebase.database();
    const storage = firebase.storage();

    // DOM elements
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const userInfoDiv = document.getElementById('userInfo');
    const userAvatar = document.getElementById('userAvatar');
    const userEmailSpan = document.getElementById('userEmail');
    const uploadSection = document.getElementById('uploadSection');
    const recordBtn = document.getElementById('recordBtn');
    const recordingStatus = document.getElementById('recordingStatus');
    const previewArea = document.getElementById('previewArea');
    const audioPreview = document.getElementById('audioPreview');
    const uploadBtn = document.getElementById('uploadBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const uploadStatus = document.getElementById('uploadStatus');
    const reviewsContainer = document.getElementById('reviewsContainer');

    // Recording variables
    let mediaRecorder;
    let audioChunks = [];
    let recordedBlob = null;
    let isRecording = false;

    // ========== AUTH STATE ==========
    auth.onAuthStateChanged(user => {
        if (user) {
            loginBtn.style.display = 'none';
            userInfoDiv.style.display = 'flex';
            userAvatar.src = user.photoURL || 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png';
            userEmailSpan.textContent = user.email;
            uploadSection.style.display = 'block';
        } else {
            loginBtn.style.display = 'block';
            userInfoDiv.style.display = 'none';
            uploadSection.style.display = 'none';
            resetRecordingUI();
        }
    });

    loginBtn.addEventListener('click', () => {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider).catch(err => alert('Login failed: ' + err.message));
    });

    logoutBtn.addEventListener('click', () => auth.signOut());

    // ========== RECORDING FUNCTIONALITY ==========
    async function startRecording() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];

            mediaRecorder.ondataavailable = event => {
                audioChunks.push(event.data);
            };

            mediaRecorder.onstop = () => {
                recordedBlob = new Blob(audioChunks, { type: 'audio/webm' });
                const audioURL = URL.createObjectURL(recordedBlob);
                audioPreview.src = audioURL;
                previewArea.style.display = 'block';
                recordingStatus.textContent = 'রেকর্ড সম্পূর্ণ! প্রিভিউ শুনে আপলোড করুন।';
                stream.getTracks().forEach(track => track.stop());
            };

            mediaRecorder.start();
            isRecording = true;
            recordBtn.classList.add('recording');
            recordBtn.innerHTML = '<i class="fas fa-stop"></i>';
            recordingStatus.textContent = 'রেকর্ডিং হচ্ছে... থামাতে আবার ক্লিক করুন।';
        } catch (err) {
            console.error(err);
            alert('মাইক্রোফোন অ্যাক্সেস দেওয়া প্রয়োজন।');
        }
    }

    function stopRecording() {
        if (mediaRecorder && isRecording) {
            mediaRecorder.stop();
            isRecording = false;
            recordBtn.classList.remove('recording');
            recordBtn.innerHTML = '<i class="fas fa-microphone"></i>';
        }
    }

    recordBtn.addEventListener('click', () => {
        if (!auth.currentUser) {
            alert('রিভিউ দিতে আগে লগইন করুন।');
            return;
        }
        if (isRecording) {
            stopRecording();
        } else {
            startRecording();
        }
    });

    function resetRecordingUI() {
        if (mediaRecorder && isRecording) stopRecording();
        previewArea.style.display = 'none';
        recordedBlob = null;
        audioPreview.src = '';
        recordingStatus.textContent = 'রেকর্ড করতে ক্লিক করুন';
        uploadStatus.innerHTML = '';
        recordBtn.classList.remove('recording');
        recordBtn.innerHTML = '<i class="fas fa-microphone"></i>';
    }

    cancelBtn.addEventListener('click', resetRecordingUI);

    // ========== UPLOAD TO FIREBASE ==========
    uploadBtn.addEventListener('click', async () => {
        const user = auth.currentUser;
        if (!user) {
            alert('আপনি লগইন নন!');
            return;
        }
        if (!recordedBlob) {
            alert('কোনো রেকর্ডিং নেই।');
            return;
        }

        uploadStatus.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> আপলোড হচ্ছে...';
        uploadBtn.disabled = true;

        const fileName = `voice_${Date.now()}.webm`;
        const storagePath = `voice_reviews/${user.uid}/${fileName}`;
        const storageRef = storage.ref(storagePath);

        try {
            // Upload file
            const snapshot = await storageRef.put(recordedBlob);
            const downloadURL = await snapshot.ref.getDownloadURL();

            // Save metadata to Realtime Database
            const reviewId = database.ref('reviews').push().key;
            const reviewData = {
                userId: user.uid,
                email: user.email,
                displayName: user.displayName || user.email,
                photoURL: user.photoURL || '',
                audioUrl: downloadURL,
                timestamp: firebase.database.ServerValue.TIMESTAMP,
                createdAt: new Date().toISOString()
            };
            await database.ref(`reviews/${reviewId}`).set(reviewData);

            uploadStatus.innerHTML = '<i class="fas fa-check-circle"></i> রিভিউ সফলভাবে আপলোড হয়েছে!';
            resetRecordingUI();
            loadReviews(); // refresh list
        } catch (error) {
            console.error(error);
            uploadStatus.innerHTML = '<i class="fas fa-exclamation-triangle"></i> আপলোড ব্যর্থ: ' + error.message;
        } finally {
            uploadBtn.disabled = false;
        }
    });

    // ========== LOAD PUBLIC REVIEWS ==========
    function loadReviews() {
        reviewsContainer.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-pulse"></i> রিভিউ লোড হচ্ছে...</div>';
        const reviewsRef = database.ref('reviews');
        reviewsRef.orderByChild('timestamp').once('value', (snapshot) => {
            const reviews = [];
            snapshot.forEach(child => {
                reviews.push({ id: child.key, ...child.val() });
            });
            reviews.reverse(); // newest first
            displayReviews(reviews);
        }).catch(err => {
            reviewsContainer.innerHTML = `<div class="no-reviews">রিভিউ লোড করতে সমস্যা: ${err.message}</div>`;
        });
    }

    function displayReviews(reviews) {
        if (!reviews.length) {
            reviewsContainer.innerHTML = '<div class="no-reviews"><i class="fas fa-comment-slash"></i> এখনো কোনো ভয়েস রিভিউ নেই। প্রথম রিভিউ দিন!</div>';
            return;
        }

        let html = '';
        reviews.forEach(review => {
            const date = review.createdAt ? new Date(review.createdAt).toLocaleString('bn-BD') : 'সদ্য';
            const avatar = review.photoURL || 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png';
            html += `
                <div class="review-card">
                    <div class="review-header">
                        <img class="review-avatar" src="${escapeHtml(avatar)}" alt="avatar">
                        <div class="review-info">
                            <div class="review-email">${escapeHtml(review.email)}</div>
                            <div class="review-date">${escapeHtml(date)}</div>
                        </div>
                    </div>
                    <div class="audio-player">
                        <audio controls src="${escapeHtml(review.audioUrl)}"></audio>
                    </div>
                </div>
            `;
        });
        reviewsContainer.innerHTML = html;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Initial load
    loadReviews();
    // Auto-refresh every 10 seconds
    setInterval(loadReviews, 10000);
</script>
</body>
</html>
